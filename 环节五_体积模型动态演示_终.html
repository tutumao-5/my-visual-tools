<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
<title>环节五：体积模型动态演示（触控优化·右侧面板）</title>
<style>
  :root{
    --ink:#1e293b;
    --muted:#64748b;
    --blue:#2563eb;
    --purple:#7c3aed;
    --green:#16a34a;
    --orange:#f97316;
    --bg1:#f8fbff;
    --bg2:#eef7ff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    height:100vh;
    overflow:hidden;
    font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;
    color:var(--ink);
    background:linear-gradient(180deg,var(--bg1),var(--bg2));
  }
  .app{
    height:100vh;
    display:grid;
    grid-template-rows:auto 1fr auto;
    gap:14px;
    padding:18px 22px 16px;
  }

  /* 中间区域：左侧画布 + 右侧按钮竖向面板 */
  .middle-layout{
    display:grid;
    grid-template-columns:1fr auto;
    gap:20px;
    min-height:0;
  }
  .canvas-area{
    display:flex;
    flex-direction:column;
    min-height:0;
  }
  .stage{
    position:relative;
    flex:1;
    min-height:0;
    background:rgba(255,255,255,.94);
    border:1px solid #dbeafe;
    border-radius:28px;
    overflow:hidden;
    box-shadow:0 12px 35px rgba(15,23,42,.08);
  }
  svg{
    width:100%;
    height:100%;
    display:block;
    user-select:none;
  }

  /* 右侧触控按钮面板（竖向，方便平板点击） */
  .right-actions{
    background:rgba(255,255,255,.75);
    backdrop-filter: blur(16px);
    border-radius: 48px;
    padding: 16px 14px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 18px;
    width: 170px;
    border: 1px solid #dbeafe;
    box-shadow: 0 12px 28px rgba(15,23,42,.1);
    align-self: center;      /* 垂直居中（偏下可微调） */
    margin: 30px 0;
  }

  .mode-buttons{
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .action-btn{
    border:0;
    border-radius: 60px;
    padding: 14px 0;
    font-size: 20px;
    font-weight: 900;
    cursor: pointer;
    background:#dbeafe;
    color:#1e3a8a;
    box-shadow:0 6px 14px rgba(37,99,235,.16);
    transition: all 0.2s ease;
    width: 100%;
    text-align: center;
    letter-spacing: 1px;
    touch-action: manipulation;
  }
  .action-btn:hover{
    transform: translateY(-2px);
    filter: brightness(0.96);
  }
  .action-btn.active{
    background:var(--blue);
    color:#fff;
    box-shadow:0 8px 18px rgba(37,99,235,.3);
  }
  .action-btn.reset{
    background:#e2e8f0;
    color:#334155;
  }
  .action-btn.reset.active{
    background:#94a3b8;
    color:white;
  }
  .start-btn{
    background: var(--orange);
    color: white;
    box-shadow: 0 8px 20px rgba(249,115,22,.3);
    margin-top: 8px;
  }
  .start-btn:hover{
    background: #ea580c;
  }
  .formula-btn{
    background:#fee2e2;
    color:#991b1b;
    box-shadow:0 8px 20px rgba(239,68,68,.18);
    display:none;
  }
  .formula-btn.show{
    display:block;
  }
  .formula-btn.active{
    background:#dc2626;
    color:#fff;
  }

  .top{
    flex-shrink:0;
  }
  h1{
    margin:0;
    font-size:30px;
    font-weight:900;
    letter-spacing:.03em;
  }
  .sub{
    margin-top:6px;
    font-size:17px;
    color:var(--muted);
    font-weight:700;
  }

  .status{
    min-height:64px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    background:#fff;
    border:1px solid #dbeafe;
    border-radius:22px;
    box-shadow:0 6px 22px rgba(15,23,42,.06);
    padding:10px 18px;
    font-size:24px;
    font-weight:900;
  }
  .badge{
    display:inline-block;
    margin-left:12px;
    padding:4px 14px;
    border-radius:999px;
    background:#eff6ff;
    color:#1d4ed8;
    font-size:20px;
  }

  /* SVG 内部样式（完全保留原效果） */
  .infoCard{
    fill:rgba(255,255,255,.94);
    stroke:#dbeafe;
    stroke-width:2;
  }
  .ghost{
    fill:rgba(148,163,184,.10);
    stroke:rgba(100,116,139,.45);
    stroke-width:2.2;
    stroke-dasharray:8 6;
    vector-effect:non-scaling-stroke;
  }
  .solidFront{fill:rgba(96,165,250,.42);stroke:#2563eb;stroke-width:3;vector-effect:non-scaling-stroke;}
  .solidTop{fill:rgba(191,219,254,.75);stroke:#2563eb;stroke-width:3;vector-effect:non-scaling-stroke;}
  .solidSide{fill:rgba(147,197,253,.58);stroke:#2563eb;stroke-width:3;vector-effect:non-scaling-stroke;}
  .cubeFront{fill:rgba(196,181,253,.40);stroke:#7c3aed;stroke-width:3;vector-effect:non-scaling-stroke;}
  .cubeTop{fill:rgba(221,214,254,.78);stroke:#7c3aed;stroke-width:3;vector-effect:non-scaling-stroke;}
  .cubeSide{fill:rgba(216,180,254,.52);stroke:#7c3aed;stroke-width:3;vector-effect:non-scaling-stroke;}
  .triBase{fill:rgba(74,222,128,.38);stroke:#16a34a;stroke-width:3.5;vector-effect:non-scaling-stroke;}
  .triBack{fill:rgba(187,247,208,.25);stroke:#16a34a;stroke-width:3;vector-effect:non-scaling-stroke;}
  .triSide{fill:rgba(134,239,172,.32);stroke:#16a34a;stroke-width:3;vector-effect:non-scaling-stroke;}
  .baseMove{
    fill:rgba(249,115,22,.30);
    stroke:#ea580c;
    stroke-width:4;
    vector-effect:non-scaling-stroke;
  }
  .layer{
    fill:rgba(250,204,21,.20);
    stroke:#d97706;
    stroke-width:1.7;
    vector-effect:non-scaling-stroke;
  }
  .edge{
    stroke:#334155;
    stroke-width:4;
    stroke-linecap:round;
    fill:none;
    vector-effect:non-scaling-stroke;
  }
  .triEdge{
    stroke:#15803d;
    stroke-width:4;
    stroke-linecap:round;
    fill:none;
    vector-effect:non-scaling-stroke;
  }
  .flash{
    animation:flash 0.9s ease-out 1;
  }
  @keyframes flash{
    0%{opacity:.18;}
    50%{opacity:1;}
    100%{opacity:1;}
  }
  .label{
    font-size:22px;
    font-weight:900;
    fill:#334155;
  }
  .big{
    font-size:32px;
    font-weight:900;
    fill:#0f172a;
  }
  .formula{
    font-size:34px;
    font-weight:900;
    fill:#dc2626;
  }
  .note{
    font-size:23px;
    font-weight:800;
    fill:#475569;
  }
  .smallNote{
    font-size:20px;
    font-weight:800;
    fill:#64748b;
  }

  /* 响应式: 小屏幕（手机或小平板）改为按钮横排 */
  @media (max-width: 860px) {
    .middle-layout{
      grid-template-columns: 1fr;
      grid-template-rows: 1fr auto;
      gap: 14px;
    }
    .right-actions{
      width: 100%;
      flex-direction: row;
      justify-content: center;
      align-items: center;
      gap: 12px;
      padding: 12px 18px;
      border-radius: 60px;
      margin: 0;
      backdrop-filter: blur(12px);
    }
    .mode-buttons{
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }
    .action-btn{
      width: auto;
      padding: 12px 20px;
      font-size: 17px;
    }
    .start-btn{
      margin-top: 0;
    }
    .right-actions{
      align-self: stretch;
    }
  }
</style>
</head>
<body>
<div class="app">
  <!-- 顶部标题区（不再包含任何操作按钮） -->
  <div class="top">
    <div>
      <h1>📐 体积模型动态演示</h1>
      <div class="sub">观察：一个底面沿着高的方向平移，逐层叠加，就能形成相应的立体。</div>
    </div>
  </div>

  <!-- 中间区域：左侧画布 + 右侧竖向按钮面板（触控优化） -->
  <div class="middle-layout">
    <div class="canvas-area">
      <section class="stage">
        <svg id="svg" viewBox="0 0 1200 680" preserveAspectRatio="xMidYMid meet">
          <g id="scene"></g>
          <g id="overlay"></g>
        </svg>
      </section>
    </div>

    <!-- 右侧快捷操作区（所有按钮都在这里，方便够到） -->
    <div class="right-actions">
      <div class="mode-buttons">
        <button id="btnCuboid" class="action-btn">📦 长方体</button>
        <button id="btnCube" class="action-btn">🧊 正方体</button>
        <button id="btnPrism" class="action-btn">🔺 直柱体</button>
        <button id="btnReset" class="action-btn reset">🔄 重置</button>
      </div>
      <button id="btnStart" class="action-btn start-btn">▶ 开始动画</button>
      <button id="btnFormula" class="action-btn formula-btn">公式</button>
    </div>
  </div>

  <div class="status" id="status">当前：请选择“长方体”“正方体”或“直柱体”，再点击右侧的“开始动画”。</div>
</div>

<script>
(() => {
  const scene = document.getElementById('scene');
  const overlay = document.getElementById('overlay');
  const statusEl = document.getElementById('status');
  const btnCuboid = document.getElementById('btnCuboid');
  const btnCube = document.getElementById('btnCube');
  const btnPrism = document.getElementById('btnPrism');
  const btnReset = document.getElementById('btnReset');
  const btnStart = document.getElementById('btnStart');
  const btnFormula = document.getElementById('btnFormula');

  const state = {
    mode: null,      // 'cuboid', 'cube', 'prism'
    progress: 0,
    anim: null,
    started: false,
    showFormula: false
  };

  function svgEl(tag, attrs = {}, parent = scene) {
    const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
    Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
    parent.appendChild(el);
    return el;
  }
  function poly(points, cls, parent = scene) {
    return svgEl('polygon', {
      points: points.map(p => `${p.x},${p.y}`).join(' '),
      class: cls
    }, parent);
  }
  function line(p1, p2, cls = 'edge', parent = scene) {
    return svgEl('line', { x1: p1.x, y1: p1.y, x2: p2.x, y2: p2.y, class: cls }, parent);
  }
  function text(content, x, y, cls = 'label', anchor = 'middle', parent = overlay) {
    const t = svgEl('text', { x, y, class: cls, 'text-anchor': anchor }, parent);
    t.textContent = content;
    return t;
  }
  function clearAll() {
    scene.innerHTML = '';
    overlay.innerHTML = '';
  }
  function setActive(mode = null) {
    [btnCuboid, btnCube, btnPrism].forEach(btn => btn.classList.remove('active'));
    if (mode === 'cuboid') btnCuboid.classList.add('active');
    if (mode === 'cube') btnCube.classList.add('active');
    if (mode === 'prism') btnPrism.classList.add('active');
  }
  function stopAnim() {
    if (state.anim) {
      cancelAnimationFrame(state.anim);
      state.anim = null;
    }
  }

  function updateFormulaButton() {
    const show = state.mode === 'cuboid' || state.mode === 'cube';
    btnFormula.classList.toggle('show', show);
    btnFormula.classList.toggle('active', state.showFormula);

    if (state.mode === 'cuboid') {
      btnFormula.textContent = state.showFormula ? '已显示公式' : '长方体公式';
    } else if (state.mode === 'cube') {
      btnFormula.textContent = state.showFormula ? '已显示公式' : '正方体公式';
    } else {
      btnFormula.textContent = '公式';
    }
  }

  // 投影长方体/正方体
  function projectRect(x, y, z, originX = 260, originY = 520, scale = 54) {
    const dx = 0.60, dy = -0.36;
    return {
      x: originX + x * scale + z * scale * dx,
      y: originY - y * scale + z * scale * dy
    };
  }

  function drawInfoCard(title, lines, formula) {
    svgEl('rect', { x: 760, y: 90, width: 350, height: 260, rx: 20, class: 'infoCard' }, overlay);
    text(title, 935, 145, 'big');
    let y = 198;
    lines.forEach(lineText => {
      text(lineText, 935, y, 'note');
      y += 42;
    });
    if (formula) {
      text(formula, 935, 318, 'formula');
    }
  }

  function drawCuboid(progress, asCube = false) {
    const L = asCube ? 4 : 5;
    const W = asCube ? 4 : 3;
    const H = asCube ? 4 : 4;
    const steps = 12;
    const visibleSteps = Math.max(0, Math.floor(progress * steps));
    const moveY = H * progress;

    const clsFront = asCube ? 'cubeFront' : 'solidFront';
    const clsTop = asCube ? 'cubeTop' : 'solidTop';
    const clsSide = asCube ? 'cubeSide' : 'solidSide';

    const p = {
      fbl: projectRect(0, 0, 0),
      fbr: projectRect(L, 0, 0),
      ftr: projectRect(L, H, 0),
      ftl: projectRect(0, H, 0),
      bbl: projectRect(0, 0, W),
      bbr: projectRect(L, 0, W),
      btr: projectRect(L, H, W),
      btl: projectRect(0, H, W)
    };

    // 空壳 / 虚线轮廓
    poly([p.bbl, p.bbr, p.btr, p.btl], 'ghost');
    poly([p.fbl, p.ftl, p.btl, p.bbl], 'ghost');
    poly([p.fbl, p.fbr, p.ftr, p.ftl], 'ghost');
    poly([p.fbr, p.bbr, p.btr, p.ftr], 'ghost');
    poly([p.ftl, p.ftr, p.btr, p.btl], 'ghost');

    // 逐层叠加（彩色薄片）
    for (let i = 0; i < visibleSteps; i++) {
      const y0 = H * (i / steps);
      const y1 = H * ((i + 1) / steps);
      const f0l = projectRect(0, y0, 0), f0r = projectRect(L, y0, 0);
      const f1l = projectRect(0, y1, 0), f1r = projectRect(L, y1, 0);
      const b0l = projectRect(0, y0, W), b0r = projectRect(L, y0, W);
      const b1l = projectRect(0, y1, W), b1r = projectRect(L, y1, W);
      poly([f0l, f0r, b0r, b0l], 'layer');
      poly([f0r, b0r, b1r, f1r], 'layer');
      poly([f0l, f1l, b1l, b0l], 'layer');
      poly([f1l, f1r, b1r, b1l], 'layer');
    }

    // 移动中的底面
    const mfl = projectRect(0, moveY, 0);
    const mfr = projectRect(L, moveY, 0);
    const mbl = projectRect(0, moveY, W);
    const mbr = projectRect(L, moveY, W);
    poly([mfl, mfr, mbr, mbl], 'baseMove');

    if (progress > 0.98) {
      poly([p.fbl, p.fbr, p.ftr, p.ftl], clsFront);
      poly([p.fbr, p.bbr, p.btr, p.ftr], clsSide);
      poly([p.ftl, p.ftr, p.btr, p.btl], clsTop);
    }

    const edges = [
      [p.fbl, p.fbr], [p.ftl, p.ftr], [p.bbl, p.bbr], [p.btl, p.btr],
      [p.fbl, p.bbl], [p.ftl, p.btl], [p.fbr, p.bbr], [p.ftr, p.btr],
      [p.fbl, p.ftl], [p.fbr, p.ftr], [p.bbl, p.btl], [p.bbr, p.btr]
    ];
    edges.forEach(e => line(e[0], e[1], 'edge'));

    if (asCube) {
      drawInfoCard(
        '正方体',
        ['正方形底面向上平移', '逐层叠加，形成正方体', '长、宽、高相等'],
        state.showFormula ? '正方体体积：V=a×a×a' : null
      );
    } else {
      drawInfoCard(
        '长方体',
        ['长方形底面向上平移', '逐层叠加，形成长方体'],
        state.showFormula ? '长方体体积：V=abh' : null
      );
    }
  }

  // 三棱柱（直柱体）专用插值函数
  function interpTri(A, B, C, A2, B2, C2, t) {
    function lerp(p, q, t) {
      return { x: p.x + (q.x - p.x) * t, y: p.y + (q.y - p.y) * t };
    }
    return { A: lerp(A, A2, t), B: lerp(B, B2, t), C: lerp(C, C2, t) };
  }

  function drawTriPrism(progress) {
    // 三角形底面三点
    const A = { x: 240, y: 520 };
    const B = { x: 490, y: 520 };
    const C = { x: 360, y: 435 };
    const offset = { x: 22, y: -185 };
    const A2 = { x: A.x + offset.x, y: A.y + offset.y };
    const B2 = { x: B.x + offset.x, y: B.y + offset.y };
    const C2 = { x: C.x + offset.x, y: C.y + offset.y };

    // 虚线轮廓闪一下
    poly([A, B, C], 'ghost flash');
    poly([A2, B2, C2], 'ghost flash');
    line(A, A2, 'triEdge');
    line(B, B2, 'triEdge');
    line(C, C2, 'triEdge');
    line(A, B, 'triEdge'); line(B, C, 'triEdge'); line(C, A, 'triEdge');
    line(A2, B2, 'triEdge'); line(B2, C2, 'triEdge'); line(C2, A2, 'triEdge');

    const steps = 12;
    const visibleSteps = Math.max(0, Math.floor(progress * steps));

    for (let i = 0; i < visibleSteps; i++) {
      const t0 = i / steps;
      const t1 = (i + 1) / steps;
      const P0 = interpTri(A, B, C, A2, B2, C2, t0);
      const P1 = interpTri(A, B, C, A2, B2, C2, t1);
      poly([P0.A, P0.B, P0.C], 'layer');
      poly([P0.A, P0.B, P1.B, P1.A], 'layer');
      poly([P0.B, P0.C, P1.C, P1.B], 'layer');
      poly([P0.C, P0.A, P1.A, P1.C], 'layer');
    }

    const M = interpTri(A, B, C, A2, B2, C2, progress);
    poly([M.A, M.B, M.C], 'baseMove');

    if (progress > 0.98) {
      poly([A, B, C], 'triBase');
      poly([A2, B2, C2], 'triBack');
      poly([A, B, B2, A2], 'triSide');
      poly([B, C, C2, B2], 'triSide');
      poly([C, A, A2, C2], 'triSide');
    }

    drawInfoCard('直柱体', ['三角形底面向上平移', '逐层堆叠，形成直柱体'], null);

    // 直柱体：动画播放完成后，才出现“共同模型”和 V=Sh。
    if (progress >= 0.995) {
      text('共同模型', 935, 318, 'big');
      text('V = Sh', 935, 382, 'formula');
      text('体积 = 底面积 × 高', 935, 438, 'note');
    }
  }

  function render() {
    clearAll();
    updateFormulaButton();
    if (!state.mode) {
      text('请选择一种立体图形', 600, 285, 'big');
      text('进入界面后，点击右侧“开始动画”观察形成过程。', 600, 340, 'note');
      return;
    }

    if (state.mode === 'cuboid') {
      drawCuboid(state.progress, false);
    } else if (state.mode === 'cube') {
      drawCuboid(state.progress, true);
    } else if (state.mode === 'prism') {
      drawTriPrism(state.progress);
    }
  }

  function selectMode(mode) {
    stopAnim();
    state.mode = mode;
    state.progress = 0;
    state.started = false;
    state.showFormula = false;
    setActive(mode);

    if (mode === 'cuboid') {
      statusEl.innerHTML = '当前：长方体界面。点击右侧“开始动画”，观察底面平移、逐层叠加。<span class="badge">长方形底面</span>';
    } else if (mode === 'cube') {
      statusEl.innerHTML = '当前：正方体界面。点击右侧“开始动画”，观察正方形底面逐层叠加。<span class="badge">正方形底面</span>';
    } else if (mode === 'prism') {
      statusEl.innerHTML = '当前：直柱体界面。点击右侧“开始动画”，观察三角形底面向上平移、逐层堆叠。<span class="badge">三角形底面</span>';
    }
    render();
  }

  function startAnimation() {
    if (!state.mode) return;
    stopAnim();
    state.started = true;
    state.progress = 0;
    const duration = state.mode === 'prism' ? 2500 : 2100;
    const start = performance.now();

    function step(now) {
      const t = Math.min(1, (now - start) / duration);
      state.progress = 1 - Math.pow(1 - t, 3); // 缓动
      render();
      if (t < 1) {
        state.anim = requestAnimationFrame(step);
      } else {
        state.progress = 1;
        state.anim = null;
        render();
        if (state.mode === 'prism') {
          statusEl.innerHTML = '直柱体展示完成：出现共同模型。<span class="badge">V = Sh</span>';
        } else if (state.mode === 'cuboid') {
          statusEl.innerHTML = '长方体展示完成：可点击右侧“长方体公式”查看体积公式。';
        } else if (state.mode === 'cube') {
          statusEl.innerHTML = '正方体展示完成：可点击右侧“正方体公式”查看体积公式。';
        }
      }
    }
    state.anim = requestAnimationFrame(step);
  }

  // 事件绑定
  btnCuboid.addEventListener('click', () => selectMode('cuboid'));
  btnCube.addEventListener('click', () => selectMode('cube'));
  btnPrism.addEventListener('click', () => selectMode('prism'));
  btnStart.addEventListener('click', startAnimation);
  btnFormula.addEventListener('click', () => {
    if (state.mode === 'cuboid' || state.mode === 'cube') {
      state.showFormula = true;
      render();
      if (state.mode === 'cuboid') {
        statusEl.innerHTML = '当前：显示长方体体积公式。<span class="badge">V = abh</span>';
      } else {
        statusEl.innerHTML = '当前：显示正方体体积公式。<span class="badge">V = a×a×a</span>';
      }
    }
  });
  btnReset.addEventListener('click', () => {
    stopAnim();
    state.mode = null;
    state.progress = 0;
    state.started = false;
    state.showFormula = false;
    setActive(null);
    statusEl.innerHTML = '当前：请选择“长方体”“正方体”或“直柱体”，再点击右侧的“开始动画”。';
    render();
  });

  render();
})();
</script>
</body>
</html>
