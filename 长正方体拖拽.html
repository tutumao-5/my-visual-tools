<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>选面定形｜棱线拖拽与数字输入流畅优化版</title>
<style>
  :root{
    --bg:#eef7ff;
    --card:#ffffff;
    --ink:#1e293b;
    --sub:#64748b;
    --blue:#2563eb;
    --orange:#f97316;
    --green:#16a34a;
    --gray:#94a3b8;
    --line:#334155;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(180deg,#f8fbff 0%,#eaf5ff 100%);
    font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;
    color:var(--ink);
  }
  .app{
    height:100vh;
    padding:18px 24px 16px;
    display:grid;
    grid-template-rows:auto 1fr auto;
    gap:14px;
  }
  .top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:18px;
  }
  h1{
    margin:0;
    font-size:28px;
    font-weight:900;
    letter-spacing:.03em;
  }
  .small{
    margin-top:6px;
    color:var(--sub);
    font-size:16px;
    font-weight:600;
  }
  .scene-buttons{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:flex-end;
  }
  button{
    border:0;
    border-radius:14px;
    padding:11px 16px;
    font-size:17px;
    font-weight:800;
    cursor:pointer;
    background:#dbeafe;
    color:#1e3a8a;
    box-shadow:0 4px 12px rgba(37,99,235,.12);
  }
  button.active{
    background:var(--blue);
    color:#fff;
  }
  button.reset{
    background:#e2e8f0;
    color:#334155;
  }
  .middle{
    min-height:0;
    display:grid;
    grid-template-columns:260px 1fr;
    gap:18px;
  }
  .panel,.stage,.status{
    background:rgba(255,255,255,.92);
    border:1px solid #dbeafe;
    border-radius:24px;
    box-shadow:0 10px 30px rgba(15,23,42,.08);
  }
  .panel{
    padding:18px;
    overflow:auto;
  }
  .panel-title{
    font-size:20px;
    font-weight:900;
    margin-bottom:12px;
  }
  .data-box{
    margin-bottom:18px;
    padding-bottom:16px;
    border-bottom:2px dashed #dbeafe;
  }
  .input-row{
    display:grid;
    grid-template-columns:52px 1fr 34px;
    gap:8px;
    align-items:center;
    margin-bottom:10px;
    font-size:18px;
    font-weight:900;
  }
  .input-row input{
    width:100%;
    height:42px;
    border-radius:12px;
    border:2px solid #bfdbfe;
    background:#f8fafc;
    padding:6px 10px;
    font-size:19px;
    font-weight:900;
    color:#1e293b;
    outline:none;
  }
  .input-row input:focus{
    border-color:var(--blue);
    box-shadow:0 0 0 3px rgba(37,99,235,.14);
  }
  .input-row input:disabled{
    color:#94a3b8;
    background:#f1f5f9;
    border-color:#cbd5e1;
    cursor:not-allowed;
  }
  .input-note{
    font-size:14px;
    color:#64748b;
    line-height:1.45;
    font-weight:700;
  }
  .switches{
    display:flex;
    flex-direction:column;
    gap:11px;
  }
  .switch{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    background:#f8fafc;
    border:1px solid #e2e8f0;
    border-radius:16px;
    padding:12px 12px;
    font-size:18px;
    font-weight:850;
  }
  .switch.locked{
    background:#ecfdf5;
    border-color:#86efac;
    color:#166534;
  }
  .switch input{
    appearance:none;
    width:48px;
    height:28px;
    border-radius:999px;
    background:#cbd5e1;
    position:relative;
    cursor:pointer;
    outline:none;
    transition:.18s;
  }
  .switch input::after{
    content:"";
    width:22px;
    height:22px;
    background:white;
    border-radius:50%;
    position:absolute;
    left:3px;
    top:3px;
    box-shadow:0 1px 5px rgba(0,0,0,.24);
    transition:.18s;
  }
  .switch input:checked{
    background:var(--green);
  }
  .switch input:checked::after{
    left:23px;
  }
  .stage{
    position:relative;
    overflow:hidden;
  }
  svg{
    width:100%;
    height:100%;
    display:block;
    user-select:none;
    touch-action:none;
    will-change:transform;
  }
  #model{
    filter:drop-shadow(0 14px 16px rgba(15,23,42,.10));
  }
  .face{
    stroke:#334155;
    stroke-width:2.1;
    vector-effect:non-scaling-stroke;
  }
  .back-face{
    stroke:#94a3b8;
    stroke-dasharray:7 7;
  }
  .locked-face{
    fill:rgba(34,197,94,.36)!important;
    stroke:#16a34a!important;
    stroke-width:3.3!important;
    stroke-dasharray:none!important;
  }
  .edge{
    stroke-linecap:round;
    vector-effect:non-scaling-stroke;
  }
  .edge-normal{
    stroke:#334155;
    stroke-width:3.2;
  }
  .edge-free{
    stroke:var(--orange);
    stroke-width:6;
  }
  .edge-fixed{
    stroke:#94a3b8;
    stroke-width:3.5;
  }
  .edge-hover{
    stroke:var(--blue)!important;
    stroke-width:9!important;
  }
  .edge-hit{
    stroke:rgba(255,0,0,0.001);
    stroke-width:34;
    stroke-linecap:round;
    fill:none;
    pointer-events:stroke;
    cursor:grab;
    vector-effect:non-scaling-stroke;
  }
  .edge-hit.fixed{
    cursor:not-allowed;
  }
  .edge-hit.dragging{
    cursor:grabbing;
  }
  .tip{
    fill:#ea580c;
    font-size:18px;
    font-weight:900;
    pointer-events:none;
  }
  .status{
    min-height:56px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:10px 20px;
    font-size:24px;
    font-weight:900;
  }
  .badge{
    margin-left:12px;
    padding:4px 12px;
    border-radius:999px;
    background:#eff6ff;
    color:#1d4ed8;
    font-size:20px;
    font-weight:900;
  }
  @media(max-width:900px){
    .middle{grid-template-columns:1fr;}
    .panel{display:none;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <div>
      <h1>选面定形：拖动棱线观察形体变化</h1>
      <div class="small">左侧可输入长、宽、高；橙色棱线也可直接拉动。</div>
    </div>
    <div class="scene-buttons">
      <button id="bottomScene">只锁定底面</button>
      <button id="oppositeScene">锁定两个相对面</button>
      <button id="adjacentScene">锁定两个相邻面</button>
      <button id="cubeScene">正方体模式</button>
      <button class="reset" id="resetBtn">重置</button>
    </div>
  </div>

  <div class="middle">
    <aside class="panel">
      <div class="data-box">
        <div class="panel-title">数据调整</div>
        <div class="input-row">
          <label for="lenInput">长</label>
          <input id="lenInput" type="number" min="1.3" max="8.3" step="0.1" value="5">
          <span>dm</span>
        </div>
        <div class="input-row">
          <label for="widInput">宽</label>
          <input id="widInput" type="number" min="1.2" max="7.3" step="0.1" value="3">
          <span>dm</span>
        </div>
        <div class="input-row">
          <label for="heiInput">高</label>
          <input id="heiInput" type="number" min="1.3" max="7.6" step="0.1" value="4">
          <span>dm</span>
        </div>
        <div class="input-note">被锁定的方向会自动变灰，表示不能改变。</div>
      </div>

      <div class="panel-title">锁定面</div>
      <div class="switches" id="switches"></div>
    </aside>

    <section class="stage">
      <svg id="svg" viewBox="0 0 1000 650" preserveAspectRatio="xMidYMid meet">        <g id="model" ></g>
        <g id="overlay"></g>
      </svg>
    </section>
  </div>

  <div class="status" id="status">当前：未锁定面，长、宽、高均可变化</div>
</div>

<script>
(() => {
  const model = document.getElementById("model");
  const overlay = document.getElementById("overlay");
  const switchesBox = document.getElementById("switches");
  const statusEl = document.getElementById("status");
  const lenInput = document.getElementById("lenInput");
  const widInput = document.getElementById("widInput");
  const heiInput = document.getElementById("heiInput");

  const faceName = {
    front:"前",
    back:"后",
    left:"左",
    right:"右",
    top:"上",
    bottom:"下"
  };

  const fullFaceName = {
    front:"前面",
    back:"后面",
    left:"左面",
    right:"右面",
    top:"上面",
    bottom:"下面"
  };

  const faceDims = {
    front:["L","H"],
    back:["L","H"],
    left:["W","H"],
    right:["W","H"],
    top:["L","W"],
    bottom:["L","W"]
  };

  const oppositePair = new Set([
    "front-back","back-front",
    "left-right","right-left",
    "top-bottom","bottom-top"
  ]);

  const state = {
    L:5,
    W:3,
    H:4,
    cube:false,
    hover:null,
    drag:null,
    locked:{
      front:false,
      back:false,
      left:false,
      right:false,
      top:false,
      bottom:false
    }
  };

  const initial = {L:5,W:3,H:4};
  let rafId = null;

  function scheduleRender(){
    if(rafId !== null) return;
    rafId = requestAnimationFrame(() => {
      rafId = null;
      renderNow();
    });
  }

  function clamp(v,min,max){
    return Math.max(min, Math.min(max, v));
  }

  function svgEl(tag, attrs, parent=model){
    const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
    Object.entries(attrs || {}).forEach(([k,v]) => el.setAttribute(k,v));
    parent.appendChild(el);
    return el;
  }

  function lockedFaces(){
    return Object.keys(state.locked).filter(f => state.locked[f]);
  }

  function hasAdjacentPair(faces){
    for(let i=0;i<faces.length;i++){
      for(let j=i+1;j<faces.length;j++){
        if(!oppositePair.has(faces[i] + "-" + faces[j])) return true;
      }
    }
    return false;
  }

  function getConstraints(){
    const faces = lockedFaces();

    if(state.cube){
      const fixed = faces.length > 0;
      return {L:fixed, W:fixed, H:fixed, unique:fixed, faces};
    }

    if(hasAdjacentPair(faces)){
      return {L:true, W:true, H:true, unique:true, faces};
    }

    const c = {L:false, W:false, H:false, unique:false, faces};
    faces.forEach(f => {
      faceDims[f].forEach(d => c[d] = true);
    });
    return c;
  }

  function isFreeEdge(type, c){
    if(state.cube) return lockedFaces().length === 0;
    if(type === "L") return !c.L;
    if(type === "W") return !c.W;
    if(type === "H") return !c.H;
    return false;
  }

  function project(){
    const s = 58;
    const depthX = .58;
    const depthY = -.35;

    function raw(x,y,z){
      return {
        x:x*s + z*s*depthX,
        y:-y*s + z*s*depthY
      };
    }

    const rawPts = {
      fbl:raw(0,0,0),
      fbr:raw(state.L,0,0),
      ftr:raw(state.L,state.H,0),
      ftl:raw(0,state.H,0),
      bbl:raw(0,0,state.W),
      bbr:raw(state.L,0,state.W),
      btr:raw(state.L,state.H,state.W),
      btl:raw(0,state.H,state.W)
    };

    const xs = Object.values(rawPts).map(p=>p.x);
    const ys = Object.values(rawPts).map(p=>p.y);
    const cx = (Math.min(...xs) + Math.max(...xs)) / 2;
    const cy = (Math.min(...ys) + Math.max(...ys)) / 2;

    const pts = {};
    Object.entries(rawPts).forEach(([k,p]) => {
      pts[k] = {x:p.x + 500 - cx, y:p.y + 318 - cy};
    });
    return pts;
  }

  function poly(points){
    return points.map(p => `${p.x},${p.y}`).join(" ");
  }

  function center(points){
    return {
      x:points.reduce((a,p)=>a+p.x,0)/points.length,
      y:points.reduce((a,p)=>a+p.y,0)/points.length
    };
  }

  function clearActive(){
    document.querySelectorAll(".scene-buttons button").forEach(b => b.classList.remove("active"));
  }

  function setActive(id){
    clearActive();
    if(id) document.getElementById(id).classList.add("active");
  }

  function setAllLocks(value){
    Object.keys(state.locked).forEach(k => state.locked[k] = value);
  }

  function buildSwitches(){
    switchesBox.innerHTML = "";
    Object.keys(faceName).forEach(f => {
      const label = document.createElement("label");
      label.className = "switch";
      label.innerHTML = `<span>${faceName[f]}面</span><input type="checkbox" data-face="${f}" />`;
      label.querySelector("input").addEventListener("change", e => {
        state.locked[f] = e.target.checked;
        clearActive();
        render();
      });
      switchesBox.appendChild(label);
    });
  }

  function syncSwitches(){
    document.querySelectorAll(".switch input").forEach(input => {
      const f = input.dataset.face;
      input.checked = state.locked[f];
      input.closest(".switch").classList.toggle("locked", state.locked[f]);
    });
  }

  function syncInputs(){
    const c = getConstraints();

    // 拖动过程中也更新数据，但只写必要值，减少输入框反复重排
    const lVal = Number(state.L).toFixed(1);
    const wVal = Number(state.W).toFixed(1);
    const hVal = Number(state.H).toFixed(1);
    if(lenInput.value !== lVal) lenInput.value = lVal;
    if(widInput.value !== wVal) widInput.value = wVal;
    if(heiInput.value !== hVal) heiInput.value = hVal;

    lenInput.disabled = c.L;
    widInput.disabled = c.W;
    heiInput.disabled = c.H;
  }

  function readInput(input, fallback, min, max){
    const raw = Number(input.value);
    if(!Number.isFinite(raw)) return fallback;
    return clamp(raw, min, max);
  }

  function handleInputChange(type){
    const c = getConstraints();

    if(state.cube){
      if(c.L || c.W || c.H){
        syncInputs();
        return;
      }
      let source = type === "L" ? lenInput : type === "W" ? widInput : heiInput;
      const v = readInput(source, state.L, 1.3, 7.3);
      state.L = state.W = state.H = v;
      lenInput.value = widInput.value = heiInput.value = v.toFixed(1);
      render();
      return;
    }

    if(type === "L" && !c.L) state.L = readInput(lenInput, state.L, 1.3, 8.3);
    if(type === "W" && !c.W) state.W = readInput(widInput, state.W, 1.2, 7.3);
    if(type === "H" && !c.H) state.H = readInput(heiInput, state.H, 1.3, 7.6);
    render();
  }

  function faceClass(name, back=false){
    let cls = "face";
    if(back) cls += " back-face";
    if(state.locked[name]) cls += " locked-face";
    return cls;
  }

  function drawFace(name, points, fill, back=false){
    svgEl("polygon", {
      points:poly(points),
      fill,
      class:faceClass(name, back)
    });
  }

  function drawEdge(id, p1, p2, type, c){
    const free = isFreeEdge(type, c);
    const visibleClass = free ? "edge edge-free" : (type === "L" && c.L || type === "W" && c.W || type === "H" && c.H ? "edge edge-fixed" : "edge edge-normal");
    const hover = state.hover === id ? " edge-hover" : "";

    svgEl("line", {
      x1:p1.x, y1:p1.y,
      x2:p2.x, y2:p2.y,
      class:visibleClass + hover
    });

    const hit = svgEl("line", {
      x1:p1.x, y1:p1.y,
      x2:p2.x, y2:p2.y,
      class:"edge-hit" + (free ? "" : " fixed") + (state.drag && state.drag.id === id ? " dragging" : ""),
      "data-id":id,
      "data-type":type
    }, overlay);

    hit.addEventListener("pointerenter", () => {
      if(isFreeEdge(type, getConstraints())){
        state.hover = id;
        render();
      }
    });

    hit.addEventListener("pointerleave", () => {
      if(!state.drag){
        state.hover = null;
        render();
      }
    });

    hit.addEventListener("pointerdown", e => {
      const now = getConstraints();
      if(!isFreeEdge(type, now)) return;
      e.preventDefault();
      state.drag = {
        id,
        type,
        x:e.clientX,
        y:e.clientY,
        L:state.L,
        W:state.W,
        H:state.H
      };
      state.hover = id;
      document.body.style.cursor = "grabbing";
    });
  }

  function drawText(text, x, y, cls="tip"){
    const t = svgEl("text", {
      x, y,
      class:cls,
      "text-anchor":"middle"
    });
    t.textContent = text;
  }

  function updateStatus(c){
    const badge = `<span class="badge">长 ${state.L.toFixed(1)}　宽 ${state.W.toFixed(1)}　高 ${state.H.toFixed(1)}</span>`;
    if(state.cube){
      if(c.faces.length > 0){
        statusEl.innerHTML = `当前：已锁定一个面，正方体唯一确定 ${badge}`;
      }else{
        statusEl.innerHTML = `当前：正方体模式，输入任一数据或拖动橙色棱线，6个面同步变化 ${badge}`;
      }
      return;
    }

    if(c.faces.length === 0){
      statusEl.innerHTML = `当前：未锁定面，长、宽、高均可变化 ${badge}`;
      return;
    }

    const names = c.faces.map(f => fullFaceName[f]).join("和");
    if(c.unique){
      statusEl.innerHTML = `当前：锁定${names}，长、宽、高已确定，形体唯一 ${badge}`;
      return;
    }

    if(c.faces.length === 2 && oppositePair.has(c.faces[0] + "-" + c.faces[1])){
      statusEl.innerHTML = `当前：锁定${names}，两面距离仍可变化 ${badge}`;
      return;
    }

    const free = [];
    if(!c.L) free.push("长");
    if(!c.W) free.push("宽");
    if(!c.H) free.push("高");
    statusEl.innerHTML = `当前：锁定${names}，${free.join("、")}仍可变化 ${badge}`;
  }

  function render(){
    scheduleRender();
  }

  function renderNow(){
    syncSwitches();

    model.innerHTML = "";
    overlay.innerHTML = "";

    const c = getConstraints();
    const p = project();

    const faces = {
      back:[p.bbl,p.bbr,p.btr,p.btl],
      left:[p.fbl,p.ftl,p.btl,p.bbl],
      bottom:[p.fbl,p.bbl,p.bbr,p.fbr],
      right:[p.fbr,p.bbr,p.btr,p.ftr],
      top:[p.ftl,p.ftr,p.btr,p.btl],
      front:[p.fbl,p.fbr,p.ftr,p.ftl]
    };

    drawFace("back", faces.back, "rgba(226,232,240,.18)", true);
    drawFace("left", faces.left, "rgba(226,232,240,.20)", true);
    drawFace("bottom", faces.bottom, "rgba(226,232,240,.24)", true);

    drawFace("right", faces.right, "rgba(219,234,254,.62)");
    drawFace("top", faces.top, "rgba(239,246,255,.82)");
    drawFace("front", faces.front, "rgba(191,219,254,.76)");

    const edges = [
      ["L1",p.fbl,p.fbr,"L"],["L2",p.ftl,p.ftr,"L"],["L3",p.bbl,p.bbr,"L"],["L4",p.btl,p.btr,"L"],
      ["W1",p.fbl,p.bbl,"W"],["W2",p.fbr,p.bbr,"W"],["W3",p.ftl,p.btl,"W"],["W4",p.ftr,p.btr,"W"],
      ["H1",p.fbl,p.ftl,"H"],["H2",p.fbr,p.ftr,"H"],["H3",p.bbl,p.btl,"H"],["H4",p.bbr,p.btr,"H"]
    ];

    edges.filter(e => !isFreeEdge(e[3],c)).forEach(e => drawEdge(...e,c));
    edges.filter(e => isFreeEdge(e[3],c)).forEach(e => drawEdge(...e,c));

    if(state.hover && !state.drag){
      const e = edges.find(item => item[0] === state.hover);
      if(e){
        const m = center([e[1],e[2]]);
        drawText("可拉动", m.x, m.y - 22);
      }
    }

    if(c.unique && !state.cube){
      drawText("形体唯一", 500, 70);
    }

    updateStatus(c);
    syncInputs();
  }

  function applyScene(scene){
    state.cube = false;
    state.L = initial.L;
    state.W = initial.W;
    state.H = initial.H;
    setAllLocks(false);

    if(scene === "bottom"){
      state.locked.bottom = true;
      setActive("bottomScene");
    }
    if(scene === "opposite"){
      state.locked.front = true;
      state.locked.back = true;
      setActive("oppositeScene");
    }
    if(scene === "adjacent"){
      state.locked.front = true;
      state.locked.right = true;
      setActive("adjacentScene");
    }
    render();
  }

  lenInput.addEventListener("change", () => handleInputChange("L"));
  widInput.addEventListener("change", () => handleInputChange("W"));
  heiInput.addEventListener("change", () => handleInputChange("H"));

  [lenInput, widInput, heiInput].forEach(input => {
    input.addEventListener("keydown", e => {
      if(e.key === "Enter") input.blur();
    });
  });

  document.getElementById("bottomScene").addEventListener("click", () => applyScene("bottom"));
  document.getElementById("oppositeScene").addEventListener("click", () => applyScene("opposite"));
  document.getElementById("adjacentScene").addEventListener("click", () => applyScene("adjacent"));
  document.getElementById("cubeScene").addEventListener("click", () => {
    state.cube = true;
    state.L = state.W = state.H = 4;
    setAllLocks(false);
    setActive("cubeScene");
    render();
  });
  document.getElementById("resetBtn").addEventListener("click", () => {
    state.cube = false;
    state.L = initial.L;
    state.W = initial.W;
    state.H = initial.H;
    setAllLocks(false);
    setActive(null);
    render();
  });

  window.addEventListener("pointermove", e => {
    if(!state.drag) return;

    const dx = e.clientX - state.drag.x;
    const dy = e.clientY - state.drag.y;
    let delta = 0;

    if(state.drag.type === "L"){
      delta = dx / 55;
    }else if(state.drag.type === "H"){
      delta = -dy / 55;
    }else if(state.drag.type === "W"){
      delta = (dx * .75 + (-dy) * .55) / 62;
    }

    if(state.cube){
      const s = clamp(state.drag.L + delta, 1.3, 7.3);
      state.L = state.W = state.H = s;
    }else{
      if(state.drag.type === "L") state.L = clamp(state.drag.L + delta, 1.3, 8.3);
      if(state.drag.type === "W") state.W = clamp(state.drag.W + delta, 1.2, 7.3);
      if(state.drag.type === "H") state.H = clamp(state.drag.H + delta, 1.3, 7.6);
    }

    render();
  });

  window.addEventListener("pointerup", () => {
    if(state.drag){
      state.drag = null;
      state.hover = null;
      document.body.style.cursor = "";
      render();
    }
  });

  window.addEventListener("pointercancel", () => {
    if(state.drag){
      state.drag = null;
      state.hover = null;
      document.body.style.cursor = "";
      render();
    }
  });

  buildSwitches();
  renderNow();
})();
</script>
</body>
</html>
