<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分数与除法的关系 - 探索新知</title>
    <!-- 引入 Tailwind CSS 进行快速样式开发 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 和 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- 引入 Babel 用于浏览器内编译 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* 自定义分数样式，使其看起来像标准的数学公式 */
        .fraction {
            display: inline-block;
            vertical-align: middle;
            text-align: center;
            margin: 0 0.2em;
            font-size: 1.1em;
        }
        .fraction > span {
            display: block;
            padding: 0.1em;
        }
        .fraction span.numerator {
            border-bottom: 2px solid currentColor;
        }
        .fraction span.denominator {
            /* padding-top: 0.1em; */
        }
        /* 简单的淡入动画 */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 新增：动物呼吸/弹跳动画，让画面更生动 */
        @keyframes gentle-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15%); }
        }
        .animal-alive {
            display: inline-block;
            animation: gentle-bounce 1.5s infinite ease-in-out;
        }
        /* 新增：错误时的震动反馈动画 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px) rotate(-2deg); }
            50% { transform: translateX(10px) rotate(2deg); }
            75% { transform: translateX(-10px) rotate(-2deg); }
        }
        .shake-error {
            animation: shake 0.4s ease-in-out;
            border-color: #ef4444 !important; /* 临时变红 */
        }
    </style>
</head>
<body class="bg-sky-50 min-h-screen font-sans selection:bg-yellow-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- 核心组件：数学分数渲染 ---
        const MathFraction = ({ num, den, colorClass = "text-red-600" }) => (
            <div className={`fraction ${colorClass} font-bold`}>
                <span className="numerator">{num}</span>
                <span className="denominator">{den}</span>
            </div>
        );

        // --- 核心组件：动物点子图渲染 (数形结合) ---
        const DotVisualizer = ({ mainCount, mainName, baseCount, baseName, mainEmoji, baseEmoji, isFraction, showText = true }) => {
            const boxes = [];
            const maxBoxes = Math.max(mainCount, baseCount);
            
            return (
                <div className="flex flex-col gap-6 mt-6 p-6 bg-white rounded-2xl shadow-inner border border-sky-100">
                    {/* 基准量 (分母) */}
                    <div className="flex items-center gap-4">
                        <div className="w-16 text-lg font-bold text-gray-700 text-right">{baseName}</div>
                        <div className="flex flex-wrap gap-2 flex-1">
                            {Array.from({ length: baseCount }).map((_, i) => (
                                <div key={`base-${i}`} className="w-12 h-12 flex items-center justify-center bg-yellow-100 rounded-lg border-2 border-yellow-300 text-2xl shadow-sm transition-transform hover:scale-110">
                                    <span className="animal-alive" style={{ animationDelay: `${i * 0.1}s` }}>{baseEmoji}</span>
                                </div>
                            ))}
                        </div>
                        <div className={`w-48 text-gray-500 font-medium text-sm border-l-4 border-yellow-400 pl-2 transition-opacity duration-700 ${showText ? 'opacity-100' : 'opacity-0'}`}>
                            把{baseCount}只看作一个<span className="text-red-500 font-bold">整体 (标准量)</span>
                        </div>
                    </div>

                    {/* 比较量 (分子) */}
                    <div className="flex items-center gap-4 relative">
                        <div className="w-16 text-lg font-bold text-gray-700 text-right">{mainName}</div>
                        <div className="flex flex-wrap gap-2 flex-1">
                            {Array.from({ length: mainCount }).map((_, i) => (
                                <div key={`main-${i}`} className="w-12 h-12 flex items-center justify-center bg-blue-100 rounded-lg border-2 border-blue-300 text-2xl shadow-sm transition-transform hover:scale-110 z-10">
                                    <span className="animal-alive" style={{ animationDelay: `${(i + baseCount) * 0.1}s` }}>{mainEmoji}</span>
                                </div>
                            ))}
                        </div>
                        
                        {/* 如果是分数，显示虚线框辅助理解 */}
                        {isFraction && (
                            <div className={`absolute left-[5.5rem] top-[-0.25rem] h-[3.5rem] border-2 border-dashed border-blue-400 rounded-xl transition-opacity duration-700 ${showText ? 'opacity-100' : 'opacity-0'}`} style={{width: `calc(${mainCount} * 3.5rem - 0.5rem)`}}></div>
                        )}

                        <div className={`w-48 text-gray-500 font-medium text-sm border-l-4 border-blue-400 pl-2 transition-opacity duration-700 ${showText ? 'opacity-100' : 'opacity-0'}`}>
                            {mainCount}只是这个整体的<br/>
                            {isFraction ? 
                                <span><MathFraction num={mainCount} den={baseCount} />。</span> 
                                : 
                                <span className="text-red-500 font-bold">{mainCount / baseCount} 倍。</span>
                            }
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [step, setStep] = useState(0); // 0: 情境, 1: 复习(整数倍), 2: 探究(分数倍), 3: 总结对比, 4: 互动挑战, 5: PK争霸赛
            const [revealStep, setRevealStep] = useState(0); // 新增：用于控制每一步内部的显示进度
            const [interactiveReveal, setInteractiveReveal] = useState({ zoo: false, rectStarted: false, rect: 0 }); 

            // --- 新增：PK游戏动态题库生成器 ---
            const generateRandomQuestions = (num = 5) => {
                const questions = [];
                for(let i=0; i<num; i++) {
                    const type = Math.floor(Math.random() * 3);
                    let q, correctOpt, distractors;
                    
                    if (type === 0) { // 题型1：基础算式
                        const a = Math.floor(Math.random() * 8) + 2; // 2-9
                        let b = Math.floor(Math.random() * 8) + 2; 
                        while (a === b) b = Math.floor(Math.random() * 8) + 2; // 确保分子分母不同
                        q = `${a} ÷ ${b} =`;
                        correctOpt = {text: `${a}/${b}`, isCorrect: true, isFrac: true, n: a, d: b};
                        distractors = [
                            {text: `${b}/${a}`, isCorrect: false, isFrac: true, n: b, d: a}, // 易错：分子分母写反
                            {text: `${a}/${b+1}`, isCorrect: false, isFrac: true, n: a, d: b+1},
                            {text: `${a+1}/${b}`, isCorrect: false, isFrac: true, n: a+1, d: b}
                        ];
                    } else if (type === 1) { // 题型2：生活分物
                        const a = Math.floor(Math.random() * 5) + 3; // 3-7块饼
                        let b = Math.floor(Math.random() * 5) + 8; // 8-12人
                        q = `把 ${a} 块饼平均分给 ${b} 个小朋友，每人分得几分之几？`;
                        correctOpt = {text: `${a}/${b}`, isCorrect: true, isFrac: true, n: a, d: b};
                        distractors = [
                            {text: `${b}/${a}`, isCorrect: false, isFrac: true, n: b, d: a}, // 易错：谁除以谁没搞清
                            {text: `${a-1}/${b}`, isCorrect: false, isFrac: true, n: a-1, d: b},
                            {text: `${a}/${b-1}`, isCorrect: false, isFrac: true, n: a, d: b-1}
                        ];
                    } else { // 题型3：动物关系
                        const animals = ['小兔', '小猫', '小狗', '小鸡', '小鸭', '小猪'];
                        const a1 = animals[Math.floor(Math.random() * animals.length)];
                        let a2 = animals[Math.floor(Math.random() * animals.length)];
                        while(a1 === a2) a2 = animals[Math.floor(Math.random() * animals.length)];
                        
                        const count1 = Math.floor(Math.random() * 7) + 2;
                        const count2 = Math.floor(Math.random() * 7) + 10;
                        
                        q = `农场有 ${count1} 只${a1}，${count2} 只${a2}，${a1}的数量是${a2}的几分之几？`;
                        correctOpt = {text: `${count1}/${count2}`, isCorrect: true, isFrac: true, n: count1, d: count2};
                        distractors = [
                            {text: `${count2}/${count1}`, isCorrect: false, isFrac: true, n: count2, d: count1}, // 易错：找错单位1
                            {text: `${count1+1}/${count2}`, isCorrect: false, isFrac: true, n: count1+1, d: count2},
                            {text: `${count1}/${count2-1}`, isCorrect: false, isFrac: true, n: count1, d: count2-1}
                        ];
                    }

                    // 随机打乱4个选项
                    const options = [correctOpt, ...distractors].sort(() => Math.random() - 0.5);
                    questions.push({ q, options });
                }
                return questions;
            };

            const [pkState, setPkState] = useState({
                status: 'idle', // idle(待机), playing(进行中), end(结束)
                qIndex: 0,
                scores: { p1: 0, p2: 0 },
                shakeInfo: null, // 'p1' 或 'p2' 用于触发错误震动
                cooldown: { p1: false, p2: false }, // 新增：玩家冷静期状态
                questions: [] // 题库现在是动态生成的
            });

            const handlePkAnswer = (player, isCorrect) => {
                if (pkState.status !== 'playing') return;
                if (pkState.cooldown[player]) return; // 如果在冷静期，直接拦截点击

                if (isCorrect) {
                    const newScores = { ...pkState.scores, [player]: pkState.scores[player] + 1 };
                    if (pkState.qIndex + 1 >= pkState.questions.length) {
                        setPkState({ ...pkState, scores: newScores, status: 'end', cooldown: { p1: false, p2: false } });
                    } else {
                        // 答对进入下一题，同时清除双方的冷静期
                        setPkState({ ...pkState, scores: newScores, qIndex: pkState.qIndex + 1, shakeInfo: null, cooldown: { p1: false, p2: false } });
                    }
                } else {
                    // 答错处理：触发震动并进入1秒冷静期
                    setPkState(prev => ({ 
                        ...prev, 
                        shakeInfo: player,
                        cooldown: { ...prev.cooldown, [player]: true } // 开启冷静期
                    }));
                    
                    setTimeout(() => {
                        setPkState(prev => ({ 
                            ...prev, 
                            shakeInfo: prev.shakeInfo === player ? null : prev.shakeInfo, // 移除震动状态
                            cooldown: { ...prev.cooldown, [player]: false } // 解除冷静期
                        }));
                    }, 1000); // 1秒冷静期惩罚
                }
            };
            // -----------------------------

            const data = {
                goose: { count: 7, name: '鹅', emoji: '🦢' },
                duck: { count: 10, name: '鸭', emoji: '🦆' },
                chicken: { count: 20, name: '鸡', emoji: '🐔' }
            };

            return (
                <div className="max-w-5xl mx-auto p-8 pt-12">
                    {/* 顶部常驻情境栏 - 解决割裂感的核心 */}
                    <div className="bg-white rounded-3xl shadow-lg p-6 mb-8 border-t-8 border-sky-400">
                        <h1 className="text-3xl font-black text-center text-gray-800 tracking-wider mb-6">
                            🦆 小新家的农场 🐔
                        </h1>
                        <div className="flex justify-around items-center text-2xl font-bold text-gray-700">
                            <div className="flex items-center gap-3 px-6 py-3 bg-blue-50 rounded-full">
                                <span className="text-4xl">🦢</span> 养鹅 <span className="text-blue-600 text-4xl mx-1">{data.goose.count}</span> 只
                            </div>
                            <div className="flex items-center gap-3 px-6 py-3 bg-yellow-50 rounded-full">
                                <span className="text-4xl">🦆</span> 养鸭 <span className="text-yellow-600 text-4xl mx-1">{data.duck.count}</span> 只
                            </div>
                            <div className="flex items-center gap-3 px-6 py-3 bg-orange-50 rounded-full">
                                <span className="text-4xl">🐔</span> 养鸡 <span className="text-orange-600 text-4xl mx-1">{data.chicken.count}</span> 只
                            </div>
                        </div>
                    </div>

                    {/* 导航控制台 (供老师点击) */}
                    <div className="flex justify-center gap-4 mb-8">
                        {['提出问题', '复习：整数倍', '探究：几分之几', '对比总结', '互动挑战', 'PK争霸赛'].map((label, idx) => (
                            <button 
                                key={idx}
                                onClick={() => { 
                                    setStep(idx); 
                                    setRevealStep(0); 
                                    setInteractiveReveal({ zoo: false, rectStarted: false, rect: 0 }); // 切换时重置盲盒状态
                                    if (idx !== 5) setPkState({ status: 'idle', qIndex: 0, scores: { p1: 0, p2: 0 }, shakeInfo: null, cooldown: {p1: false, p2: false}, questions: [] }); // 离开PK页面重置游戏
                                }}
                                className={`px-6 py-3 rounded-xl font-bold text-lg transition-all ${
                                    step === idx 
                                    ? 'bg-sky-500 text-white shadow-md transform scale-105' 
                                    : 'bg-white text-gray-500 hover:bg-sky-100'
                                }`}
                            >
                                {idx + 1}. {label}
                            </button>
                        ))}
                    </div>

                    {/* 主内容区域 */}
                    <div className="bg-white rounded-3xl shadow-xl p-10 min-h-[500px]">
                        
                        {/* 步骤 0：提出问题 */}
                        {step === 0 && (
                            <div className="text-center fade-in flex flex-col items-center justify-center h-full pt-10">
                                <h2 className="text-4xl font-bold text-gray-800 mb-8 bg-yellow-100 inline-block px-8 py-4 rounded-full shadow-sm">
                                    你们能从中任意选择两个量，<br/>提出一个问题并解答吗？
                                </h2>
                                <img src="https://api.iconify.design/noto:thinking-face.svg" alt="思考" className="w-32 h-32 animate-bounce mt-8" />
                                <p className="text-gray-500 mt-6 text-xl">老师可以邀请学生上台，选择接下来要研究的问题。</p>
                            </div>
                        )}

                        {/* 步骤 1：复习整数倍 */}
                        {step === 1 && (
                            <div className="fade-in">
                                <div className="flex items-center gap-4 mb-6">
                                    <div className="bg-orange-500 text-white px-4 py-2 rounded-lg font-bold text-xl">问题 1</div>
                                    <h2 className="text-3xl font-bold text-gray-800">鸡的只数是鸭的多少倍？</h2>
                                </div>
                                
                                <DotVisualizer 
                                    mainCount={data.chicken.count} mainName={data.chicken.name} mainEmoji={data.chicken.emoji}
                                    baseCount={data.duck.count} baseName={data.duck.name} baseEmoji={data.duck.emoji}
                                    isFraction={false}
                                    showText={revealStep >= 1}
                                />

                                {revealStep >= 2 ? (
                                    <div className="mt-10 bg-orange-50 p-6 rounded-2xl border border-orange-200 text-center relative overflow-hidden fade-in">
                                        <div className="absolute top-[-10px] right-[-10px] bg-orange-200 text-orange-800 px-6 py-2 rounded-bl-3xl font-bold transform rotate-12">温故知新</div>
                                        <p className="text-2xl text-gray-700 mb-4">求“谁是谁的几倍”的问题，用<span className="text-red-500 font-bold mx-2">除法</span>计算。</p>
                                        <div className="text-5xl font-black text-gray-800 my-6 tracking-widest">
                                            20 ÷ 10 = <span className="text-red-600">2</span>
                                        </div>
                                        <p className="text-2xl font-bold text-gray-800">答：鸡的只数是鸭的 <span className="text-red-600 bg-yellow-200 px-2 rounded">2倍</span>。</p>
                                    </div>
                                ) : (
                                    <div className="mt-10 flex justify-center">
                                        {revealStep === 0 ? (
                                            <button onClick={() => setRevealStep(1)} className="px-8 py-4 bg-orange-100 text-orange-600 border-2 border-orange-300 rounded-full font-bold text-xl hover:bg-orange-200 animate-pulse shadow-sm transition-all">
                                                👉 第一步：观察动画，找准“整体”(点击显示文字提示)
                                            </button>
                                        ) : (
                                            <button onClick={() => setRevealStep(2)} className="px-8 py-4 bg-red-100 text-red-600 border-2 border-red-300 rounded-full font-bold text-xl hover:bg-red-200 animate-pulse shadow-sm transition-all">
                                                👉 第二步：尝试列式计算 (点击显示除法算式)
                                            </button>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* 步骤 2：探究分数关系 */}
                        {step === 2 && (
                            <div className="fade-in">
                                <div className="flex items-center gap-4 mb-6">
                                    <div className="bg-blue-500 text-white px-4 py-2 rounded-lg font-bold text-xl">问题 2</div>
                                    <h2 className="text-3xl font-bold text-gray-800">
                                        鹅的只数是鸭的多少倍？<span className="text-red-500 text-2xl ml-4 font-normal">(怎样列式得出结果？)</span>
                                    </h2>
                                </div>

                                {revealStep >= 1 ? (
                                    <div className="fade-in">
                                        <DotVisualizer 
                                            mainCount={data.goose.count} mainName={data.goose.name} mainEmoji={data.goose.emoji}
                                            baseCount={data.duck.count} baseName={data.duck.name} baseEmoji={data.duck.emoji}
                                            isFraction={true}
                                        />
                                    </div>
                                ) : (
                                    <div className="mt-8 flex justify-center">
                                        <button onClick={() => setRevealStep(1)} className="px-8 py-4 bg-blue-100 text-blue-600 border-2 border-blue-300 rounded-full font-bold text-xl hover:bg-blue-200 animate-pulse shadow-sm transition-all">
                                            👉 第一步：显示图形辅助，找准“整体”
                                        </button>
                                    </div>
                                )}

                                {revealStep >= 1 && (
                                    revealStep >= 2 ? (
                                        <div className="mt-10 flex gap-8 fade-in">
                                            <div className="flex-1 bg-blue-50 p-6 rounded-2xl border border-blue-200 text-center relative">
                                                <p className="text-2xl text-gray-700 mb-4">根据分数与除法的关系：被除数÷除数 = <MathFraction num="被除数" den="除数" colorClass="text-gray-700"/></p>
                                                <div className="text-5xl font-black text-gray-800 my-6 flex justify-center items-center gap-4">
                                                    7 ÷ 10 = <MathFraction num="7" den="10" />
                                                </div>
                                            </div>
                                            
                                            {revealStep >= 3 ? (
                                                <div className="flex-1 bg-green-50 p-6 rounded-2xl border border-green-200 flex flex-col justify-center items-center relative fade-in">
                                                     <div className="absolute top-[-15px] bg-red-500 text-white px-4 py-1 rounded-full font-bold shadow-md animate-pulse">重要约定！</div>
                                                     <p className="text-2xl font-bold text-gray-800 leading-relaxed text-center mt-4">
                                                        答：鹅的只数是鸭的 <MathFraction num="7" den="10" /> <span className="line-through text-gray-400 mx-1">倍</span>。
                                                    </p>
                                                    <p className="text-lg text-red-600 mt-4 bg-red-100 px-4 py-2 rounded-lg text-center">
                                                        当倍数是分数时，一般<span className="font-bold underline">省略“倍”字</span>，<br/>直接用“几分之几”表示。
                                                    </p>
                                                </div>
                                            ) : (
                                                <div className="flex-1 flex justify-center items-center">
                                                    <button onClick={() => setRevealStep(3)} className="px-6 py-3 bg-green-100 text-green-700 border-2 border-green-300 rounded-full font-bold text-lg hover:bg-green-200 animate-pulse shadow-sm transition-all">
                                                        👉 第三步：揭示规范答题方法
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    ) : (
                                        <div className="mt-8 flex justify-center fade-in">
                                            <button onClick={() => setRevealStep(2)} className="px-8 py-4 bg-indigo-100 text-indigo-600 border-2 border-indigo-300 rounded-full font-bold text-xl hover:bg-indigo-200 animate-pulse shadow-sm transition-all">
                                                👉 第二步：结合旧知，尝试列出算式
                                            </button>
                                        </div>
                                    )
                                )}
                            </div>
                        )}

                        {/* 步骤 3：对比总结 */}
                        {step === 3 && (
                            <div className="fade-in h-full flex flex-col">
                                <h2 className="text-3xl font-bold text-red-600 mb-8 flex items-center gap-3">
                                    <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    回顾与反思：问题(1)和问题(2)有什么不同？
                                </h2>
                                
                                <div className="flex gap-6 flex-1">
                                    {/* 左侧对比 */}
                                    <div className="flex-1 border-4 border-gray-200 rounded-2xl p-6 flex flex-col items-center relative group hover:border-orange-400 transition-colors">
                                        <h3 className="text-2xl text-blue-700 font-bold mb-6">(1) 鸡的只数是鸭的多少倍？</h3>
                                        
                                        {revealStep >= 1 ? (
                                            <div className="w-full flex flex-col items-center fade-in">
                                                <div className="text-4xl font-bold text-gray-800 mb-8">20 ÷ 10 = <span className="bg-yellow-300 px-2 rounded">2</span></div>
                                                <p className="text-xl font-bold">答：鸡的只数是鸭的2倍。</p>
                                            </div>
                                        ) : (
                                            <div className="flex-1 flex items-center justify-center text-gray-400 text-lg border-2 border-dashed border-gray-200 w-full rounded-xl mb-4 bg-gray-50">等待回顾算式...</div>
                                        )}
                                        
                                        {revealStep >= 2 && (
                                            <div className="mt-auto bg-orange-400 text-white text-2xl font-bold py-3 px-8 rounded-full shadow-lg transform group-hover:-translate-y-2 transition-transform fade-in w-full text-center">
                                                计算结果是：整数
                                            </div>
                                        )}
                                    </div>

                                    {/* 中间连接符号 */}
                                    <div className="flex items-center justify-center w-32">
                                        {revealStep >= 2 && (
                                            <div className="bg-gray-100 p-4 rounded-full font-bold text-xl text-gray-500 shadow-inner text-center fade-in">
                                                核心方法相同<br/>（都用除法）
                                            </div>
                                        )}
                                    </div>

                                    {/* 右侧对比 */}
                                    <div className="flex-1 border-4 border-gray-200 rounded-2xl p-6 flex flex-col items-center relative group hover:border-blue-400 transition-colors">
                                        <h3 className="text-2xl text-blue-700 font-bold mb-6">(2) 鹅的只数是鸭的<span className="text-red-600 border-2 border-red-500 px-2 py-1 rounded-lg bg-red-50 ml-2">几分之几？</span></h3>
                                        
                                        {revealStep >= 1 ? (
                                            <div className="w-full flex flex-col items-center fade-in">
                                                <div className="text-4xl font-bold text-gray-800 mb-8 flex items-center gap-2">
                                                    7 ÷ 10 = <span className="bg-yellow-300 px-2 rounded flex items-center"><MathFraction num="7" den="10" colorClass="text-gray-800" /></span>
                                                </div>
                                                <p className="text-xl font-bold flex items-center gap-2">
                                                    答：鹅的只数是鸭的 <MathFraction num="7" den="10" /> <span className="text-gray-400 relative">倍<span className="absolute w-full h-1 bg-red-500 left-0 top-1/2 transform -translate-y-1/2 rotate-12"></span></span> 。
                                                </p>
                                            </div>
                                        ) : (
                                            <div className="flex-1 flex items-center justify-center text-gray-400 text-lg border-2 border-dashed border-gray-200 w-full rounded-xl mb-4 bg-gray-50">等待回顾算式...</div>
                                        )}
                                        
                                        {revealStep >= 2 && (
                                            <div className="mt-auto flex flex-col items-center gap-3 fade-in w-full">
                                                <div className="bg-orange-400 text-white text-2xl font-bold py-3 px-8 rounded-full shadow-lg transform group-hover:-translate-y-2 transition-transform w-full text-center">
                                                    计算结果是：分数
                                                </div>
                                                <div className="text-red-600 font-bold text-center">
                                                    一般省略“倍”字，<br/>直接用几分之几表示。
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                
                                {/* 底部统一控制按钮 */}
                                <div className="mt-8 flex justify-center h-16">
                                    {revealStep === 0 && (
                                        <button onClick={() => setRevealStep(1)} className="px-8 py-3 bg-gray-800 text-white rounded-full font-bold text-xl hover:bg-gray-700 shadow-lg animate-bounce transition-all">
                                            👇 第一步：回顾对比双方算式
                                        </button>
                                    )}
                                    {revealStep === 1 && (
                                        <button onClick={() => setRevealStep(2)} className="px-8 py-3 bg-red-500 text-white rounded-full font-bold text-xl hover:bg-red-600 shadow-lg animate-bounce transition-all">
                                            👇 第二步：揭示核心异同点
                                        </button>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* 步骤 4：互动挑战 (更新) */}
                        {step === 4 && (
                            <div className="fade-in h-full flex flex-col">
                                <h2 className="text-3xl font-bold text-purple-600 mb-6 flex items-center gap-3">
                                    <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                                    互动挑战：检测与拓展
                                </h2>

                                <div className="grid grid-cols-2 gap-8 flex-1">
                                    {/* 任务一：教材实战 (原任务二前移) */}
                                    <div className="bg-emerald-50 rounded-3xl p-6 border-4 border-emerald-200 relative shadow-sm flex flex-col">
                                        <div className="absolute top-[-15px] right-[-15px] bg-emerald-500 text-white px-4 py-2 rounded-xl font-bold transform rotate-6 shadow-md">任务一</div>
                                        <h3 className="text-2xl font-bold text-gray-800 mb-4">动物园探秘 🐘🐒</h3>
                                        <p className="text-lg text-gray-600 mb-2">教材“做一做”：动物园里有大象 9 头，金丝猴 4 只。</p>
                                        <p className="text-xl font-bold text-emerald-700 mb-4">问题：金丝猴的数量是大象的几分之几？</p>
                                        
                                        {!interactiveReveal.zoo ? (
                                            <div className="flex-1 flex items-center justify-center">
                                                <button onClick={() => setInteractiveReveal(prev => ({...prev, zoo: true}))} className="px-8 py-4 bg-emerald-200 text-emerald-800 border-2 border-emerald-400 rounded-full font-bold text-xl hover:bg-emerald-300 animate-pulse shadow-sm flex items-center gap-2">
                                                    ⏳ 讨论完成后，点击核对算式与图形
                                                </button>
                                            </div>
                                        ) : (
                                            <div className="fade-in mt-2 flex flex-col justify-between flex-1">
                                                <div className="transform scale-90 origin-top">
                                                    <DotVisualizer 
                                                        mainCount={4} mainName="金丝猴" mainEmoji="🐒"
                                                        baseCount={9} baseName="大象" baseEmoji="🐘"
                                                        isFraction={true}
                                                        showText={true}
                                                    />
                                                </div>
                                                <div className="mt-2 bg-white p-4 rounded-xl border-2 border-emerald-100 flex flex-wrap items-center justify-between shadow-inner">
                                                    <div className="text-3xl font-black text-gray-800 flex items-center gap-2">
                                                        4 ÷ 9 = <MathFraction num="4" den="9" />
                                                    </div>
                                                    <p className="text-xl font-bold text-emerald-700 bg-emerald-100 px-4 py-2 rounded-lg">答：是 <MathFraction num="4" den="9" /> 。</p>
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    {/* 任务二：拓展挑战题 (新增防错题) */}
                                    <div className="bg-amber-50 rounded-3xl p-6 border-4 border-amber-200 relative shadow-sm flex flex-col">
                                        <div className="absolute top-[-15px] right-[-15px] bg-amber-500 text-white px-4 py-2 rounded-xl font-bold transform -rotate-6 shadow-md">任务二</div>
                                        <h3 className="text-2xl font-bold text-gray-800 mb-4">挑战题：寻找“单位 1” 📏</h3>
                                        <p className="text-lg text-gray-700 mb-4 font-bold flex items-center gap-2">
                                            下列长方形的面积是 2 m²，请在图中画出 <MathFraction num="1" den="2" colorClass="text-amber-700" /> m²。
                                        </p>

                                        <div className="flex-1 flex flex-col items-center justify-center gap-6">
                                            {/* 长方形动态可视化 */}
                                            <div className="w-64 h-32 border-4 border-gray-800 flex relative overflow-hidden bg-white shadow-inner">
                                                {/* 左侧 1m² 区域 */}
                                                <div className={`flex-1 flex flex-col transition-all duration-700 ${interactiveReveal.rect >= 1 ? 'border-r-4 border-dashed border-red-400' : ''}`}>
                                                    {Array.from({length: 2}).map((_, i) => (
                                                        <div key={`l-${i}`} className={`flex-1 transition-colors duration-500 ${interactiveReveal.rect >= 2 ? 'border-b-2 border-dotted border-gray-400' : ''} ${interactiveReveal.rect >= 3 && i < 1 ? 'bg-amber-400' : 'bg-transparent'}`}>
                                                        </div>
                                                    ))}
                                                </div>
                                                {/* 右侧 1m² 区域 */}
                                                <div className="flex-1 flex flex-col transition-all duration-700">
                                                    {Array.from({length: 2}).map((_, i) => (
                                                        <div key={`r-${i}`} className={`flex-1 transition-colors duration-500 ${interactiveReveal.rect >= 2 ? 'border-b-2 border-dotted border-gray-400' : ''}`}>
                                                        </div>
                                                    ))}
                                                </div>
                                                {/* 动画文字标签 */}
                                                {interactiveReveal.rect === 1 && (
                                                    <>
                                                        <div className="absolute top-1/2 left-1/4 transform -translate-x-1/2 -translate-y-1/2 text-red-500 font-bold text-xl fade-in">1 m²</div>
                                                        <div className="absolute top-1/2 left-3/4 transform -translate-x-1/2 -translate-y-1/2 text-red-500 font-bold text-xl fade-in">1 m²</div>
                                                    </>
                                                )}
                                                {interactiveReveal.rect >= 2 && (
                                                    <div className="absolute top-2 left-2 text-gray-500 text-sm font-bold fade-in"><MathFraction num="1" den="2" /> m² / 格</div>
                                                )}
                                            </div>

                                            {/* 引导按钮与提示 */}
                                            <div className="w-full h-24 flex items-center justify-center">
                                                {!interactiveReveal.rectStarted ? (
                                                    <button onClick={() => setInteractiveReveal(prev => ({...prev, rectStarted: true}))} className="px-8 py-3 bg-amber-500 text-white rounded-full font-bold text-xl hover:bg-amber-600 shadow-lg animate-pulse transition-all">
                                                        ▶ 开始讲解
                                                    </button>
                                                ) : (
                                                    <>
                                                        {interactiveReveal.rect === 0 && (
                                                            <button onClick={() => setInteractiveReveal(prev => ({...prev, rect: 1}))} className="px-6 py-3 bg-amber-200 text-amber-800 border-2 border-amber-400 rounded-full font-bold text-lg hover:bg-amber-300 animate-pulse shadow-sm fade-in">
                                                                👉 第一步：先找出 1 m² 在哪里？
                                                            </button>
                                                        )}
                                                        {interactiveReveal.rect === 1 && (
                                                            <div className="text-center fade-in w-full">
                                                                <p className="text-gray-700 font-bold mb-2">1. 将 2 m² 平均分成两半，每半是 1 m²。</p>
                                                                <button onClick={() => setInteractiveReveal(prev => ({...prev, rect: 2}))} className="px-6 py-2 bg-amber-200 text-amber-800 border-2 border-amber-400 rounded-full font-bold hover:bg-amber-300 shadow-sm">
                                                                    👉 第二步：如何在 1 m² 中表示 1/2 m²？
                                                                </button>
                                                            </div>
                                                        )}
                                                        {interactiveReveal.rect === 2 && (
                                                            <div className="text-center fade-in w-full">
                                                                <p className="text-gray-700 font-bold mb-2">2. 将 1 m² 平均分成 2 份，每小格是 <MathFraction num="1" den="2"/> m²。</p>
                                                                <button onClick={() => setInteractiveReveal(prev => ({...prev, rect: 3}))} className="px-6 py-2 bg-red-100 text-red-600 border-2 border-red-300 rounded-full font-bold hover:bg-red-200 shadow-sm animate-bounce">
                                                                    👉 第三步：画出 1/2 m²
                                                                </button>
                                                            </div>
                                                        )}
                                                        {interactiveReveal.rect === 3 && (
                                                            <div className="text-center fade-in w-full bg-white p-3 rounded-xl border border-amber-200 shadow-sm">
                                                                <p className="text-amber-700 font-bold text-xl flex items-center justify-center gap-2">
                                                                    3. 涂出其中的 1 小格，就是 <MathFraction num="1" den="2"/> m² ！🎉
                                                                </p>
                                                            </div>
                                                        )}
                                                    </>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 步骤 5：双人PK小游戏 (更新为动态题库 + 4选项) */}
                        {step === 5 && (
                            <div className="fade-in h-full flex flex-col">
                                <h2 className="text-3xl font-bold text-rose-600 mb-6 flex items-center gap-3">
                                    <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                    巅峰对决：抢答争霸赛 🏆
                                </h2>

                                {/* 【修正 UI 塌陷】增加了 min-h-[500px] 确保游戏界面被撑开 */}
                                <div className="flex-1 bg-white rounded-3xl border-4 border-gray-800 overflow-hidden flex flex-col relative shadow-2xl min-h-[500px]">
                                    
                                    {/* 游戏未开始 */}
                                    {pkState.status === 'idle' && (
                                        <div className="absolute inset-0 bg-gray-900/80 z-20 flex flex-col items-center justify-center fade-in backdrop-blur-sm">
                                            <h3 className="text-5xl font-black text-white mb-8 tracking-widest drop-shadow-lg">准备好迎接挑战了吗？</h3>
                                            <p className="text-gray-200 text-2xl mb-12">请两位同学分别站到屏幕的 <span className="text-rose-400 font-bold">左侧</span> 和 <span className="text-cyan-400 font-bold">右侧</span></p>
                                            <p className="text-yellow-300 text-xl mb-12 font-bold animate-pulse">💡 提示：拼手速！看清选项再点，点错会有震动惩罚哦！</p>
                                            <button 
                                                onClick={() => setPkState(prev => ({...prev, status: 'playing', questions: generateRandomQuestions(5)}))}
                                                className="px-12 py-6 bg-gradient-to-r from-rose-500 to-orange-500 text-white rounded-full font-black text-4xl hover:scale-110 transform transition-all shadow-[0_0_40px_rgba(244,63,94,0.6)] animate-pulse"
                                            >
                                                🚀 点击开始比赛
                                            </button>
                                        </div>
                                    )}

                                    {/* 游戏结束结算 */}
                                    {pkState.status === 'end' && (
                                        <div className="absolute inset-0 bg-white z-20 flex flex-col items-center justify-center fade-in">
                                            <h3 className="text-6xl font-black text-gray-800 mb-8 tracking-widest">🏆 比赛结束 🏆</h3>
                                            <div className="flex gap-16 mb-12">
                                                <div className="text-center">
                                                    <div className="text-3xl font-bold text-rose-500 mb-4">红方选手</div>
                                                    <div className="text-7xl font-black text-rose-600">{pkState.scores.p1} 分</div>
                                                </div>
                                                <div className="text-5xl font-black text-gray-300 self-center">VS</div>
                                                <div className="text-center">
                                                    <div className="text-3xl font-bold text-cyan-500 mb-4">蓝方选手</div>
                                                    <div className="text-7xl font-black text-cyan-600">{pkState.scores.p2} 分</div>
                                                </div>
                                            </div>
                                            <div className="text-4xl font-bold text-yellow-500 bg-yellow-50 px-8 py-4 rounded-full border-2 border-yellow-400 mb-8">
                                                {pkState.scores.p1 > pkState.scores.p2 ? "🎉 恭喜！红方获胜！" : pkState.scores.p1 < pkState.scores.p2 ? "🎉 恭喜！蓝方获胜！" : "🤝 势均力敌，平局！"}
                                            </div>
                                            <button 
                                                onClick={() => setPkState({ status: 'idle', qIndex: 0, scores: { p1: 0, p2: 0 }, shakeInfo: null, cooldown: {p1: false, p2: false}, questions: [] })}
                                                className="px-8 py-3 bg-gray-800 text-white rounded-full font-bold text-xl hover:bg-gray-700 shadow-lg transition-all"
                                            >
                                                再换两位同学挑战！
                                            </button>
                                        </div>
                                    )}

                                    {/* 题目展示区 (共用) */}
                                    <div className="h-1/3 bg-gray-50 flex flex-col items-center justify-center p-6 border-b-4 border-gray-800 relative z-10 shadow-sm">
                                        <div className="absolute top-4 left-6 text-gray-400 font-bold text-xl">第 {pkState.qIndex + 1} / {pkState.questions.length || 5} 题</div>
                                        <div className="text-4xl font-bold text-gray-800 text-center leading-relaxed">
                                            {pkState.questions[pkState.qIndex]?.q}
                                        </div>
                                    </div>

                                    {/* 玩家操作区 (分屏 + 2x2田字格布局) */}
                                    <div className="flex-1 flex bg-gray-100">
                                        
                                        {/* 玩家1 (红方) */}
                                        <div className={`relative flex-1 bg-rose-50 border-r-4 border-gray-800 p-6 flex flex-col transition-colors ${pkState.shakeInfo === 'p1' ? 'shake-error bg-rose-200' : ''}`}>
                                            {/* 新增：冷静期遮罩层 */}
                                            {pkState.cooldown.p1 && (
                                                <div className="absolute inset-0 z-20 bg-rose-900/10 flex items-center justify-center backdrop-blur-[2px]">
                                                    <div className="bg-white px-6 py-3 rounded-full text-rose-600 font-bold text-2xl shadow-xl animate-bounce">
                                                        ⏳ 冷静 1 秒
                                                    </div>
                                                </div>
                                            )}
                                            
                                            <div className="w-full flex justify-between items-center mb-6">
                                                <span className="text-2xl font-black text-rose-600 bg-rose-200 px-4 py-1 rounded-lg shadow-sm">红方</span>
                                                <span className="text-4xl font-black text-rose-500">{pkState.scores.p1} <span className="text-xl">分</span></span>
                                            </div>
                                            <div className="w-full flex-1 grid grid-cols-2 gap-4">
                                                {pkState.questions[pkState.qIndex]?.options.map((opt, i) => (
                                                    <button 
                                                        key={`p1-opt-${i}`}
                                                        disabled={pkState.cooldown.p1}
                                                        onClick={() => handlePkAnswer('p1', opt.isCorrect)}
                                                        className={`w-full h-24 bg-white border-4 border-rose-300 rounded-2xl shadow-md text-3xl font-bold text-rose-700 active:scale-95 transition-transform flex items-center justify-center ${pkState.cooldown.p1 ? 'opacity-50 cursor-not-allowed' : 'hover:bg-rose-100'}`}
                                                    >
                                                        {opt.isFrac ? <MathFraction num={opt.n} den={opt.d} colorClass="text-rose-700" /> : opt.text}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        {/* 玩家2 (蓝方) */}
                                        <div className={`relative flex-1 bg-cyan-50 p-6 flex flex-col transition-colors ${pkState.shakeInfo === 'p2' ? 'shake-error bg-cyan-200' : ''}`}>
                                            {/* 新增：冷静期遮罩层 */}
                                            {pkState.cooldown.p2 && (
                                                <div className="absolute inset-0 z-20 bg-cyan-900/10 flex items-center justify-center backdrop-blur-[2px]">
                                                    <div className="bg-white px-6 py-3 rounded-full text-cyan-600 font-bold text-2xl shadow-xl animate-bounce">
                                                        ⏳ 冷静 1 秒
                                                    </div>
                                                </div>
                                            )}

                                            <div className="w-full flex justify-between items-center mb-6">
                                                <span className="text-4xl font-black text-cyan-500">{pkState.scores.p2} <span className="text-xl">分</span></span>
                                                <span className="text-2xl font-black text-cyan-600 bg-cyan-200 px-4 py-1 rounded-lg shadow-sm">蓝方</span>
                                            </div>
                                            <div className="w-full flex-1 grid grid-cols-2 gap-4">
                                                {pkState.questions[pkState.qIndex]?.options.map((opt, i) => (
                                                    <button 
                                                        key={`p2-opt-${i}`}
                                                        disabled={pkState.cooldown.p2}
                                                        onClick={() => handlePkAnswer('p2', opt.isCorrect)}
                                                        className={`w-full h-24 bg-white border-4 border-cyan-300 rounded-2xl shadow-md text-3xl font-bold text-cyan-700 active:scale-95 transition-transform flex items-center justify-center ${pkState.cooldown.p2 ? 'opacity-50 cursor-not-allowed' : 'hover:bg-cyan-100'}`}
                                                    >
                                                        {opt.isFrac ? <MathFraction num={opt.n} den={opt.d} colorClass="text-cyan-700" /> : opt.text}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                    </div>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
