<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空间可视化拆解 - 五年级数学</title>
    
    <!-- 引入 Tailwind CSS 引擎 -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 和 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- 引入 Babel 独立版，用于在浏览器中实时编译 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* 防止出现滚动条 */
            background-color: #0f172a; /* 默认深色背景 */
        }
        /* 确保 React 根节点占满全屏 */
        #root {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // === 矢量图标组件 (替代 lucide-react，确保单文件独立运行) ===
        const Icon = ({ children, size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const Play = (p) => <Icon {...p}><polygon points="5 3 19 12 5 21 5 3"></polygon></Icon>;
        const Pause = (p) => <Icon {...p}><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></Icon>;
        const RotateCcw = (p) => <Icon {...p}><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path></Icon>;
        const ChevronRight = (p) => <Icon {...p}><polyline points="9 18 15 12 9 6"></polyline></Icon>;
        const ChevronLeft = (p) => <Icon {...p}><polyline points="15 18 9 12 15 6"></polyline></Icon>;
        const Layers = (p) => <Icon {...p}><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></Icon>;
        const MousePointer2 = (p) => <Icon {...p}><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"></path><path d="M13 13l6 6"></path></Icon>;
        const ZoomIn = (p) => <Icon {...p}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></Icon>;
        const ZoomOut = (p) => <Icon {...p}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></Icon>;
        const Focus = (p) => <Icon {...p}><circle cx="12" cy="12" r="3"></circle><path d="M3 7V5a2 2 0 0 1 2-2h2"></path><path d="M17 3h2a2 2 0 0 1 2 2v2"></path><path d="M21 17v2a2 2 0 0 1-2 2h-2"></path><path d="M7 21H5a2 2 0 0 1-2-2v-2"></path></Icon>;

        // === 缩放基准 ===
        const U = 60; // 1dm = 60px

        // === 配色方案 ===
        const COLORS = {
            wood:  { top: '#fbbf24', bottom: '#b45309', left: '#f59e0b', right: '#fbbf24', front: '#f59e0b', back: '#d97706' },
            cube1: { top: '#fca5a5', bottom: '#991b1b', left: '#ef4444', right: '#f87171', front: '#ef4444', back: '#b91c1c' },
            green: { top: '#86efac', bottom: '#14532d', left: '#22c55e', right: '#4ade80', front: '#22c55e', back: '#166534' },
            blue:  { top: '#93c5fd', bottom: '#1e40af', left: '#3b82f6', right: '#60a5fa', front: '#3b82f6', back: '#1e3a8a' },
            yellow:{ top: '#fef08a', bottom: '#713f12', left: '#eab308', right: '#fde047', front: '#eab308', back: '#854d0e' },
            cyan:  { top: '#67e8f9', bottom: '#083344', left: '#22d3ee', right: '#67e8f9', front: '#06b6d4', back: '#155e75' },
        };

        // === 空间坐标映射 ===
        const mathToCss = (mx, my, mz) => [
            (mx - 1.5) * U, 
            -(my - 1.25) * U,
            (mz - 1) * U
        ];

        // === 3D 核心渲染组件 ===
        const Box3D = ({ size, center, offset = [0, 0, 0], colors, opacity = 1, isWireframe = false, onClick, isFocused = false }) => {
            const w = size[0] * U;
            const h = size[1] * U;
            const d = size[2] * U;
            const [cx, cy, cz] = mathToCss(center[0] + offset[0], center[1] + offset[1], center[2] + offset[2]);

            const glowShadow = isFocused ? `inset 0 0 20px ${colors.top}` : 'none';

            const faceStyle = {
                position: 'absolute', left: '50%', top: '50%',
                marginLeft: -w / 2, marginTop: -h / 2,
                boxSizing: 'border-box',
                border: isWireframe ? (isFocused ? `3px solid ${colors.top}` : '2px dashed rgba(255,255,255,0.4)') : '1.5px solid rgba(0,0,0,0.4)',
                opacity: isWireframe ? (isFocused ? 0.3 : 0.15) : opacity,
                cursor: onClick ? 'pointer' : 'default',
                boxShadow: isWireframe ? glowShadow : 'none',
                transition: 'all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)' 
            };

            const fZ = { width: w, height: h, marginLeft: -w / 2, marginTop: -h / 2 }; 
            const fX = { width: d, height: h, marginLeft: -d / 2, marginTop: -h / 2 }; 
            const fY = { width: w, height: d, marginLeft: -w / 2, marginTop: -d / 2 }; 

            return (
                <div 
                    style={{
                        position: 'absolute', left: '50%', top: '50%',
                        transformStyle: 'preserve-3d',
                        transform: `translate3d(${cx}px, ${cy}px, ${cz}px)`,
                        transition: 'transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s'
                    }}
                    onClick={onClick}
                >
                    <div style={{ ...faceStyle, ...fZ, background: colors.front, transform: `translateZ(${d/2}px)` }} />
                    <div style={{ ...faceStyle, ...fZ, background: colors.back, transform: `rotateY(180deg) translateZ(${d/2}px)` }} />
                    <div style={{ ...faceStyle, ...fX, background: colors.right, transform: `rotateY(90deg) translateZ(${w/2}px)` }} />
                    <div style={{ ...faceStyle, ...fX, background: colors.left, transform: `rotateY(-90deg) translateZ(${w/2}px)` }} />
                    <div style={{ ...faceStyle, ...fY, background: colors.top, transform: `rotateX(90deg) translateZ(${h/2}px)` }} />
                    <div style={{ ...faceStyle, ...fY, background: colors.bottom, transform: `rotateX(-90deg) translateZ(${h/2}px)` }} />
                </div>
            );
        };

        // === 全视角标签看板 ===
        const Billboard = ({ mx, my, mz, offset=[0,0,0], text, rot, highlight, visible, colorTheme="default" }) => {
            const [cx, cy, cz] = mathToCss(mx + offset[0], my + offset[1], mz + offset[2]);
            
            const themeClasses = {
                default: highlight ? 'bg-yellow-400 text-yellow-900 border-yellow-200 scale-125' : 'bg-white/90 text-slate-800 border-white/50',
                green: 'bg-emerald-900/80 text-emerald-200 border-emerald-500/50 scale-90 text-sm shadow-[0_0_10px_rgba(16,185,129,0.3)]',
                blue: 'bg-blue-900/80 text-blue-200 border-blue-500/50 scale-90 text-sm shadow-[0_0_10px_rgba(59,130,246,0.3)]',
            };

            return (
                <div style={{
                    position: 'absolute', left: '50%', top: '50%',
                    transform: `translate3d(${cx}px, ${cy}px, ${cz}px) rotateY(${-rot.y}deg) rotateX(${-rot.x}deg)`,
                    opacity: visible ? 1 : 0, pointerEvents: 'none',
                    transition: 'opacity 0.5s, transform 0.1s linear',
                    display: 'flex', alignItems: 'center', justifyItems: 'center'
                }}>
                    <div className={`px-2 py-1 rounded-lg font-bold border-2 transition-all duration-500 whitespace-nowrap ${themeClasses[colorTheme]}`}>
                        {text}
                    </div>
                </div>
            );
        };

        // === 主应用组件 ===
        function App() {
            const [step, setStep] = useState(0);
            const [rot, setRot] = useState({ x: -25, y: -40 });
            const [zoom, setZoom] = useState(1); 
            const [isDragging, setIsDragging] = useState(false);
            const [autoRotate, setAutoRotate] = useState(true);
            const [focusedPiece, setFocusedPiece] = useState(null);

            const dragRef = useRef({ isDragging: false, startX: 0, startY: 0 });

            useEffect(() => { setFocusedPiece(null); }, [step]);

            const handlePointerDown = (e) => {
                dragRef.current = { isDragging: false, startX: e.clientX, startY: e.clientY };
                setIsDragging(true);
                setAutoRotate(false);
                e.currentTarget.setPointerCapture(e.pointerId);
            };
            
            const handlePointerMove = (e) => {
                if (!isDragging) return;
                if (Math.abs(e.clientX - dragRef.current.startX) > 5 || Math.abs(e.clientY - dragRef.current.startY) > 5) {
                    dragRef.current.isDragging = true; 
                }
                setRot(r => ({
                    x: Math.max(-85, Math.min(85, r.x - e.movementY * 0.4)),
                    y: r.y + e.movementX * 0.4
                }));
            };
            
            const handlePointerUp = (e) => {
                setIsDragging(false);
                e.currentTarget.releasePointerCapture(e.pointerId);
            };
            
            const handleWheel = (e) => {
                setZoom(z => Math.max(0.4, Math.min(3, z - e.deltaY * 0.002)));
            };

            const handlePieceClick = (pieceName, e) => {
                if (dragRef.current.isDragging) return;
                e.stopPropagation();
                
                setFocusedPiece(prev => {
                    const isActivating = prev !== pieceName;
                    if (isActivating) {
                        if (pieceName === 'green') {
                            setRot({ x: -45, y: -30 });
                            setZoom(1.8);
                        } else {
                            setRot({ x: -15, y: -30 });
                            setZoom(1.8);
                        }
                    } else {
                        setRot({ x: -25, y: -40 });
                        setZoom(1);
                    }
                    return isActivating ? pieceName : null;
                });
            };

            useEffect(() => {
                if (!autoRotate || isDragging || focusedPiece) return; 
                let frame;
                const loop = () => {
                    setRot(r => ({ ...r, y: r.y + 0.2 }));
                    frame = requestAnimationFrame(loop);
                };
                frame = requestAnimationFrame(loop);
                return () => cancelAnimationFrame(frame);
            }, [autoRotate, isDragging, focusedPiece]);

            const isSlicing = step === 1;
            const isExploded = step >= 2;
            
            const greenOffset = isExploded ? [0, 1.2, 0] : (isSlicing ? [0, 0.5, 0] : [0, 0, 0]);
            const blueOffset  = isExploded ? [1.5, 0, 0] : (isSlicing ? [0.5, 0, 0] : [0, 0, 0]);
            const yellowOffset = blueOffset; 
            const cyanOffset = greenOffset;

            let sceneTranslate = [0, 0, 0];
            if (focusedPiece === 'green') {
                const cssCenter = mathToCss(1 + greenOffset[0], 2.25 + greenOffset[1], 1 + greenOffset[2]);
                sceneTranslate = [-cssCenter[0], -cssCenter[1], -cssCenter[2]];
            } else if (focusedPiece === 'blue') {
                const cssCenter = mathToCss(2.5 + blueOffset[0], 1.25 + blueOffset[1], 1 + blueOffset[2]);
                sceneTranslate = [-cssCenter[0], -cssCenter[1], -cssCenter[2]];
            }

            const getOpacities = () => {
                if (step === 0) return { wood: 1, red: 0, green: 0, blue: 0, yellow: 0, cyan: 0 };
                if (step === 1) return { wood: 0, red: 1, green: 0.8, blue: 0.8, yellow: 0, cyan: 0 };
                if (step === 2) return { wood: 0, red: 1, green: 1, blue: 1, yellow: 0, cyan: 0 };
                
                if (step === 3) {
                    if (focusedPiece === 'green') return { wood: 0, red: 0.05, green: 1, blue: 0.02, yellow: 0, cyan: 1 };
                    if (focusedPiece === 'blue') return { wood: 0, red: 0.05, green: 0.02, blue: 1, yellow: 1, cyan: 0 };
                    return { wood: 0, red: 0.05, green: 1, blue: 1, yellow: 1, cyan: 1 };
                }
                return {};
            };
            const op = getOpacities();

            const TUTORIAL = [
                {
                    title: "1. 认识原木块",
                    desc: (
                        <React.Fragment>
                            <p>观察这个长方体，它的尺寸是：</p>
                            <ul className="list-disc pl-5 my-3 space-y-2 text-indigo-100">
                                <li>长: <span className="text-white font-bold bg-white/10 px-2 py-0.5 rounded">3 dm</span></li>
                                <li>宽: <span className="text-yellow-300 font-bold bg-yellow-500/20 px-2 py-0.5 rounded">2 dm (最短边)</span></li>
                                <li>高: <span className="text-white font-bold bg-white/10 px-2 py-0.5 rounded">2.5 dm</span></li>
                            </ul>
                        </React.Fragment>
                    )
                },
                {
                    title: "2. 切割最大的正方体",
                    desc: (
                        <React.Fragment>
                            <p>要想切出一个最大的正方体，必须遵循<strong className="text-rose-400">“短板效应”</strong>。</p>
                            <p className="mt-2 text-slate-300">木块的最短边是宽 (2dm)，如果正方体边长超过2，就会“切到空气”。</p>
                            <div className="bg-gradient-to-r from-rose-500/20 to-transparent border-l-4 border-rose-500 p-3 rounded-r-lg mt-4 text-rose-100">
                                <strong>【动态演示】</strong> 沿着 2dm 的尺寸切下第一刀，原木块开始分离。<br/><br/>
                                第一块正方体体积 = 2³ = <strong>8 dm³</strong>。
                            </div>
                        </React.Fragment>
                    )
                },
                {
                    title: "3. 物理拆解剩余部分",
                    desc: (
                        <React.Fragment>
                            <p>拿走中间红色的正方体后，我们清晰地看到剩余部分变成了<strong className="text-white">独立的两个薄片</strong>：</p>
                            <div className="space-y-4 mt-4">
                                <div className="flex gap-3 bg-emerald-500/10 p-3 rounded-xl border border-emerald-500/20">
                                    <span className="w-4 h-4 rounded-full bg-emerald-500 mt-1 shadow-[0_0_10px_rgba(16,185,129,0.5)] flex-shrink-0"></span>
                                    <div><strong className="text-emerald-300">顶部绿色薄片</strong><br/><span className="text-sm text-slate-400">长2 × 宽2 × <b>高0.5</b></span></div>
                                </div>
                                <div className="flex gap-3 bg-blue-500/10 p-3 rounded-xl border border-blue-500/20">
                                    <span className="w-4 h-4 rounded-full bg-blue-500 mt-1 shadow-[0_0_10px_rgba(59,130,246,0.5)] flex-shrink-0"></span>
                                    <div><strong className="text-blue-300">侧面蓝色长条</strong><br/><span className="text-sm text-slate-400"><b>长1</b> × 宽2 × 高2.5</span></div>
                                </div>
                            </div>
                        </React.Fragment>
                    )
                },
                {
                    title: "4. 透视寻找第二个正方体",
                    desc: (
                        <React.Fragment>
                            <div className="bg-indigo-500/20 border border-indigo-400/30 p-3 rounded-lg flex items-start gap-3 mb-4 animate-pulse">
                                <Focus className="w-6 h-6 text-indigo-300 flex-shrink-0 mt-0.5" />
                                <p className="text-sm text-indigo-100"><strong>互动提示：</strong>请用鼠标<strong className="text-white">点击 3D 画面中的绿片或蓝片</strong>，镜头将自动放大透视并显示其详细尺寸！</p>
                            </div>
                            <div className="space-y-3 mt-4 text-[15px]">
                                <p className={`p-2 rounded transition-all cursor-pointer ${focusedPiece === 'green' ? 'bg-emerald-900/50 border border-emerald-500/50' : 'hover:bg-white/5'}`} onClick={() => setFocusedPiece('green')}>
                                🟢 绿片最短边是 <strong className="text-white">0.5</strong>，能切出的最大体积为 0.125
                                </p>
                                <p className={`p-2 rounded transition-all cursor-pointer ${focusedPiece === 'blue' ? 'bg-blue-900/50 border border-blue-500/50' : 'hover:bg-white/5'}`} onClick={() => setFocusedPiece('blue')}>
                                🔵 蓝条最短边是 <strong className="text-white">1</strong>，能切出的最大体积为 1
                                </p>
                            </div>
                            <div className="bg-gradient-to-r from-yellow-500/20 to-transparent border-l-4 border-yellow-500 p-4 rounded-r-lg mt-5 text-yellow-100 shadow-lg">
                                因为 <strong className="text-white">黄色(1) &gt; 青色(0.125)</strong>。<br/>
                                所以第二个最大正方体藏在蓝色木条中，体积是 <strong className="text-white text-2xl drop-shadow-md">1 dm³</strong>！
                            </div>
                        </React.Fragment>
                    )
                }
            ];

            return (
                <div className="w-full h-screen overflow-hidden relative bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-800 via-slate-900 to-black text-white font-sans select-none">
                
                {/* 3D 交互主视图 */}
                <div 
                    className="absolute inset-0 flex items-center justify-center cursor-grab active:cursor-grabbing perspective-[1500px]"
                    onPointerDown={handlePointerDown}
                    onPointerMove={handlePointerMove}
                    onPointerUp={handlePointerUp}
                    onWheel={handleWheel}
                >
                    <div 
                        style={{ 
                            transformStyle: 'preserve-3d', 
                            transform: `scale(${zoom}) rotateX(${rot.x}deg) rotateY(${rot.y}deg) translate3d(${sceneTranslate[0]}px, ${sceneTranslate[1]}px, ${sceneTranslate[2]}px)`, 
                            transition: isDragging ? 'none' : 'transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)' 
                        }} 
                        className="relative w-0 h-0"
                    >
                        {/* 科技感网格地面 */}
                        <div style={{
                            position: 'absolute', left: '50%', top: '50%', width: 1200, height: 1200, marginLeft: -600, marginTop: -600,
                            transform: `translate3d(0, ${1.25 * U + 2}px, 0) rotateX(90deg)`,
                            background: `linear-gradient(rgba(255,255,255,0.05) 2px, transparent 2px), linear-gradient(90deg, rgba(255,255,255,0.05) 2px, transparent 2px)`,
                            backgroundSize: `${U}px ${U}px`,
                            WebkitMaskImage: 'radial-gradient(circle at center, black 20%, transparent 60%)',
                            pointerEvents: 'none',
                        }}/>

                        <Box3D size={[3, 2.5, 2]} center={[1.5, 1.25, 1]} colors={COLORS.wood} opacity={op.wood} />
                        <Box3D size={[2, 2, 2]} center={[1, 1, 1]} colors={COLORS.cube1} opacity={op.red} />
                        
                        <Box3D size={[2, 0.5, 2]} center={[1, 2.25, 1]} colors={COLORS.green} offset={greenOffset} opacity={op.green} isWireframe={step === 3} isFocused={focusedPiece === 'green'} onClick={(e) => step === 3 && handlePieceClick('green', e)} />
                        <Box3D size={[1, 2.5, 2]} center={[2.5, 1.25, 1]} colors={COLORS.blue} offset={blueOffset} opacity={op.blue} isWireframe={step === 3} isFocused={focusedPiece === 'blue'} onClick={(e) => step === 3 && handlePieceClick('blue', e)} />
                        
                        <Box3D size={[1, 1, 1]} center={[2.5, 0.5, 1.5]} colors={COLORS.yellow} offset={yellowOffset} opacity={op.yellow} />
                        <Box3D size={[0.5, 0.5, 0.5]} center={[1.75, 2.25, 1.75]} colors={COLORS.cyan} offset={cyanOffset} opacity={op.cyan} />

                        {/* 尺寸标注 */}
                        <Billboard mx={1.5} my={0} mz={2.1} text="长 3dm" rot={rot} visible={step === 0} />
                        <Billboard mx={3.1} my={0} mz={1} text="宽 2dm" rot={rot} visible={step <= 1} highlight={step === 1} />
                        <Billboard mx={3.1} my={1.25} mz={0} text="高 2.5dm" rot={rot} visible={step === 0} />

                        <Billboard mx={1} my={2.25} mz={2.1} offset={greenOffset} text="绿长:2" rot={rot} visible={step === 3 && focusedPiece === 'green'} colorTheme="green" />
                        <Billboard mx={2.1} my={2.25} mz={1} offset={greenOffset} text="绿宽:2" rot={rot} visible={step === 3 && focusedPiece === 'green'} colorTheme="green" />
                        <Billboard mx={2.1} my={2.25} mz={2.1} offset={greenOffset} text="高:0.5" rot={rot} visible={step === 3 && focusedPiece === 'green'} colorTheme="green" />

                        <Billboard mx={2.5} my={0} mz={2.1} offset={blueOffset} text="蓝长:1" rot={rot} visible={step === 3 && focusedPiece === 'blue'} colorTheme="blue" />
                        <Billboard mx={3.1} my={0} mz={1} offset={blueOffset} text="蓝宽:2" rot={rot} visible={step === 3 && focusedPiece === 'blue'} colorTheme="blue" />
                        <Billboard mx={3.1} my={1.25} mz={2.1} offset={blueOffset} text="高:2.5" rot={rot} visible={step === 3 && focusedPiece === 'blue'} colorTheme="blue" />
                    </div>
                </div>

                {/* 左下角控制悬浮窗 */}
                <div className="absolute bottom-6 left-6 flex flex-col gap-2 z-20 pointer-events-none">
                    {focusedPiece && (
                    <button onClick={() => setFocusedPiece(null)} className="w-full px-4 py-2.5 mb-2 flex items-center justify-center gap-2 rounded-xl bg-rose-500 hover:bg-rose-400 text-white font-bold shadow-xl shadow-rose-500/30 transition-all pointer-events-auto animate-bounce">
                        <Focus size={18}/> 退出透视模式
                    </button>
                    )}
                    
                    <div className="flex items-center gap-2 bg-white/5 backdrop-blur-md border border-white/10 p-2.5 rounded-2xl shadow-2xl pointer-events-auto">
                    <button onClick={() => setAutoRotate(!autoRotate)} className="w-12 h-12 flex items-center justify-center rounded-xl bg-indigo-500 hover:bg-indigo-400 text-white transition-colors shadow-lg shadow-indigo-500/30">
                        {autoRotate ? <Pause size={22}/> : <Play size={22}/>}
                    </button>
                    <div className="w-px h-8 bg-white/20 mx-1"></div>
                    <button onClick={() => { setRot({x: -25, y: -40}); setZoom(1); setFocusedPiece(null); }} className="px-4 h-12 flex items-center justify-center gap-2 rounded-xl bg-white/10 hover:bg-white/20 text-white text-sm font-semibold transition-colors">
                        <RotateCcw size={18}/> 复位
                    </button>
                    
                    <div className="flex gap-1 border-l border-white/10 pl-3 ml-1">
                        <button onClick={() => setZoom(z => Math.min(3, z + 0.2))} className="w-10 h-10 flex items-center justify-center rounded-lg bg-white/10 hover:bg-white/20 text-white active:scale-90 transition-all"><ZoomIn size={18}/></button>
                        <button onClick={() => setZoom(z => Math.max(0.4, z - 0.2))} className="w-10 h-10 flex items-center justify-center rounded-lg bg-white/10 hover:bg-white/20 text-white active:scale-90 transition-all"><ZoomOut size={18}/></button>
                    </div>
                    </div>
                </div>

                {/* 教学控制侧边栏 (右侧) */}
                <div className="absolute inset-x-0 bottom-0 top-auto md:inset-y-0 md:right-0 md:left-auto w-full md:w-[450px] p-4 md:p-6 pointer-events-none z-20 flex flex-col justify-end md:justify-center">
                    <div className="bg-slate-900/80 backdrop-blur-2xl border border-slate-700/50 p-6 md:p-8 rounded-[2rem] shadow-2xl pointer-events-auto flex flex-col max-h-[85vh] md:max-h-none">
                    
                    <h1 className="text-2xl md:text-3xl font-bold text-white mb-2 flex items-center gap-3">
                        <Layers className="text-indigo-400 w-8 h-8"/> 空间切割动画
                    </h1>
                    <p className="text-slate-400 text-sm md:text-base mb-8 font-medium tracking-wide">五年级下册 · 攻克重难点</p>

                    <div className="flex gap-2 mb-8">
                        {[0, 1, 2, 3].map(i => (
                        <div key={i} className={`h-2 flex-1 rounded-full transition-all duration-500 ${step >= i ? 'bg-indigo-500 shadow-[0_0_12px_rgba(99,102,241,0.6)]' : 'bg-slate-800'}`} />
                        ))}
                    </div>

                    <div className="flex-1 overflow-y-auto pr-2 mb-8">
                        <h2 className="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400 mb-6 transition-all">
                        {TUTORIAL[step].title}
                        </h2>
                        <div className="text-slate-300 text-base md:text-[17px] leading-relaxed">
                        {TUTORIAL[step].desc}
                        </div>
                    </div>

                    <div className="flex gap-4">
                        <button 
                        onClick={() => setStep(s => Math.max(0, s - 1))}
                        disabled={step === 0}
                        className={`flex-1 flex justify-center items-center py-4 rounded-2xl font-bold transition-all ${step === 0 ? 'bg-slate-800 text-slate-600 cursor-not-allowed' : 'bg-slate-800 text-slate-300 hover:bg-slate-700'}`}
                        >
                        <ChevronLeft className="w-5 h-5 mr-1" /> 回顾
                        </button>
                        
                        {step < 3 ? (
                        <button 
                            onClick={() => setStep(s => Math.min(3, s + 1))}
                            className="flex-[2] flex justify-center items-center py-4 rounded-2xl font-bold bg-indigo-600 hover:bg-indigo-500 text-white shadow-[0_8px_20px_-6px_rgba(99,102,241,0.6)] transition-all active:scale-95"
                        >
                            下一步拆解 <ChevronRight className="w-5 h-5 ml-1" />
                        </button>
                        ) : (
                        <button 
                            onClick={() => setStep(0)}
                            className="flex-[2] flex justify-center items-center py-4 rounded-2xl font-bold bg-emerald-600 hover:bg-emerald-500 text-white shadow-[0_8px_20px_-6px_rgba(16,185,129,0.6)] transition-all active:scale-95"
                        >
                            <RotateCcw className="w-5 h-5 mr-2" /> 重新演示
                        </button>
                        )}
                    </div>
                    
                    </div>
                </div>

                </div>
            );
        }

        // 渲染到 DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
