<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>平移与旋转：4张卡片拼图动画</title>
<style>
  :root {
    --cell: min(15vw, 118px);
    --grid: #21c4d3;
    --ink: #1f2937;
    --muted: #6b7280;
    --orange: #f97316;
    --blue: #2563eb;
    --panel: rgba(255,255,255,0.92);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: "Microsoft YaHei", "PingFang SC", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at top left, rgba(34,197,94,0.10), transparent 34%),
      linear-gradient(135deg, #f8fafc, #eef9ff 55%, #fff7ed);
  }
  .app {
    max-width: 1240px;
    margin: 0 auto;
    padding: 24px 22px 28px;
  }
  .hero {
    display: flex;
    justify-content: space-between;
    gap: 18px;
    align-items: flex-end;
    margin-bottom: 18px;
  }
  h1 {
    margin: 0 0 8px;
    font-size: clamp(26px, 3.2vw, 42px);
    letter-spacing: 0.03em;
  }
  .subtitle {
    margin: 0;
    font-size: clamp(15px, 1.5vw, 19px);
    color: var(--muted);
    line-height: 1.55;
  }
  .tag {
    flex: 0 0 auto;
    padding: 10px 14px;
    border-radius: 999px;
    background: #fff;
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    color: #0f766e;
    font-weight: 700;
    font-size: 15px;
  }
  .layout {
    display: grid;
    grid-template-columns: 1fr;
    gap: 18px;
    align-items: start;
  }
  .board, .panel {
    background: var(--panel);
    border: 1px solid rgba(15, 23, 42, 0.08);
    border-radius: 26px;
    box-shadow: 0 18px 45px rgba(15, 23, 42, 0.10);
  }
  .board {
    padding: 22px;
    overflow: hidden;
  }
  .stage-wrap {
    display: flex;
    justify-content: center;
    padding: 12px 4px 6px;
  }
  .stage {
    width: calc(var(--cell) * 5);
    height: calc(var(--cell) * 2);
    position: relative;
    background-color: white;
    background-image:
      linear-gradient(to right, var(--grid) 0 2px, transparent 2px),
      linear-gradient(to bottom, var(--grid) 0 2px, transparent 2px);
    background-size: var(--cell) var(--cell);
    border-right: 2px solid var(--grid);
    border-bottom: 2px solid var(--grid);
    border-radius: 4px;
    box-shadow: inset 0 0 0 9999px rgba(255,255,255,0.08), 0 12px 30px rgba(2,132,199,0.10);
  }
  .ghost {
    position: absolute;
    width: var(--cell);
    height: var(--cell);
    display: grid;
    place-items: center;
    color: rgba(37, 99, 235, 0.20);
    font-size: calc(var(--cell) * 0.42);
    font-weight: 900;
    pointer-events: none;
  }
  .ghost::after {
    content: "";
    position: absolute;
    inset: 9px;
    border: 2px dashed rgba(37, 99, 235, 0.18);
    border-radius: 16px;
  }
  .piece {
    position: absolute;
    width: var(--cell);
    height: var(--cell);
    transform-origin: 50% 50%;
    will-change: transform;
    z-index: 3;
    filter: drop-shadow(0 6px 8px rgba(15,23,42,.09));
  }
  .piece img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    background: white;
  }
  .piece.active img {
    outline: 4px solid rgba(249, 115, 22, .78);
    outline-offset: -4px;
    border-radius: 10px;
  }
  .badge {
    position: absolute;
    z-index: 6;
    width: 34px;
    height: 34px;
    display: grid;
    place-items: center;
    border: 3px solid var(--blue);
    color: var(--blue);
    background: rgba(255,255,255,0.88);
    border-radius: 999px;
    font-weight: 900;
    font-size: 20px;
    line-height: 1;
    pointer-events: none;
    box-shadow: 0 3px 8px rgba(15,23,42,.10);
  }
  .badge.active {
    border-color: var(--orange);
    color: var(--orange);
    transform: scale(1.08);
  }
  #motionSvg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
    pointer-events: none;
    z-index: 8;
  }
  #pathLine {
    stroke: #ef4444;
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 10 9;
    opacity: 0;
  }
  #rotateText {
    font-size: 18px;
    font-weight: 900;
    fill: #dc2626;
    opacity: 0;
    paint-order: stroke;
    stroke: white;
    stroke-width: 5px;
  }
  .legend {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 18px;
  }
  .legend div {
    background: rgba(248,250,252,.88);
    border: 1px solid rgba(15,23,42,.06);
    border-radius: 16px;
    padding: 10px 12px;
    font-size: 14px;
    line-height: 1.45;
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
  }
  button {
    border: 0;
    border-radius: 999px;
    padding: 11px 16px;
    background: #0f172a;
    color: white;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 10px 22px rgba(15, 23, 42, 0.14);
    transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
  }
  button:hover { transform: translateY(-1px); box-shadow: 0 14px 28px rgba(15, 23, 42, 0.18); }
  button.secondary { background: #2563eb; }
  button.light { background: white; color: #0f172a; border: 1px solid rgba(15,23,42,.10); }
  button.orange { background: #ea580c; }
  .sliderBox {
    margin: 20px auto 0;
    max-width: 740px;
    padding: 14px 16px;
    background: rgba(255,255,255,.72);
    border: 1px solid rgba(15,23,42,.07);
    border-radius: 18px;
  }
  .sliderTop { display: flex; justify-content: space-between; gap: 12px; font-size: 14px; color: var(--muted); font-weight: 700; margin-bottom: 8px; }
  input[type="range"] { width: 100%; accent-color: #ea580c; }
  .panel {
    padding: 20px;
    position: sticky;
    top: 16px;
  }
  .panel h2 {
    margin: 0 0 10px;
    font-size: 23px;
  }
  .motion-card {
    border-radius: 20px;
    background: #fff;
    border: 1px solid rgba(15,23,42,.07);
    padding: 16px;
    margin: 14px 0;
    min-height: 152px;
    box-shadow: 0 8px 22px rgba(15,23,42,.07);
  }
  .motion-card .big {
    font-size: 28px;
    font-weight: 900;
    color: var(--blue);
    margin-bottom: 6px;
  }
  .motion-card .line {
    font-size: 17px;
    line-height: 1.62;
    margin: 0;
  }
  .formula {
    margin-top: 10px;
    padding: 10px 12px;
    border-radius: 14px;
    background: #f8fafc;
    color: #334155;
    font-weight: 800;
    line-height: 1.55;
  }
  .table {
    width: 100%;
    border-collapse: collapse;
    overflow: hidden;
    border-radius: 14px;
    font-size: 14px;
  }
  .table th, .table td {
    padding: 9px 8px;
    text-align: left;
    border-bottom: 1px solid #e5e7eb;
  }
  .table th { background: #eff6ff; color: #1d4ed8; }
  .table tr:last-child td { border-bottom: 0; }
  .hint {
    margin-top: 14px;
    color: #475569;
    line-height: 1.7;
    background: #fff7ed;
    border: 1px solid #fed7aa;
    border-radius: 16px;
    padding: 12px 14px;
    font-size: 14px;
  }
  
  .question-box {
    margin: 2px 4px 16px;
    padding: 16px 18px;
    background: linear-gradient(135deg, #ffffff, #f8fbff);
    border: 1px solid rgba(15, 23, 42, 0.08);
    border-radius: 18px;
    box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
  }
  .question-box .q-title {
    font-size: clamp(20px, 2.1vw, 28px);
    font-weight: 900;
    line-height: 1.6;
    letter-spacing: 0.01em;
  }
  .question-box .q-tip {
    margin-top: 8px;
    color: #475569;
    font-size: 14px;
    line-height: 1.6;
  }

  
  .preview-strip {
    display: grid;
    grid-template-columns: repeat(2, minmax(260px, 1fr));
    gap: 14px;
    margin: 0 4px 16px;
  }
  .preview-card {
    background: linear-gradient(135deg, #ffffff, #f8fbff);
    border: 1px solid rgba(15, 23, 42, 0.08);
    border-radius: 18px;
    box-shadow: 0 8px 22px rgba(15, 23, 42, 0.06);
    padding: 12px;
  }
  .preview-card h3 {
    margin: 0 0 10px;
    font-size: 18px;
    color: #0f172a;
  }
  .preview-card img {
    width: 100%;
    display: block;
    border-radius: 12px;
    border: 1px solid rgba(15,23,42,.08);
    background: #fff;
  }

  @media (max-width: 980px) {
    :root { --cell: min(18vw, 104px); }
    .preview-strip { grid-template-columns: 1fr; }
    .layout { grid-template-columns: 1fr; }
    .panel { position: static; }
    .hero { align-items: flex-start; flex-direction: column; }
    .legend { grid-template-columns: 1fr; }
  }
  @media (max-width: 620px) {
    :root { --cell: 18.2vw; }
    .app { padding: 16px 10px; }
    .board { padding: 12px 8px; border-radius: 18px; }
    .panel { padding: 16px; }
    button { padding: 10px 12px; font-size: 13px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="hero">
    <div>
      <h1>平移与旋转：4张卡片拼图动画</h1>
      <p class="subtitle">先观察图案方向，再判断终点位置；平移时不能斜着走，要分成向左、向右、向上或向下几格来观察。</p>
    </div>
    <div class="tag">五年级下册 · 图形运动应用</div>
  </div>

const pathLine = document.getElementById('pathLine');
const rotateText = document.getElementById('rotateText');

function cellSize() { return stage.getBoundingClientRect().width / 5; }
function ease(t) { return t < .5 ? 2*t*t : 1 - Math.pow(-2*t + 2, 2)/2; }
function clamp01(t){ return Math.max(0, Math.min(1, t)); }

function opTransform(op, ratio, cell) {
  const r = ease(clamp01(ratio));
  if (op.type === 'moveX') return {tx: op.value * cell * r, ty: 0, rot: 0};
  if (op.type === 'moveY') return {tx: 0, ty: op.value * cell * r, rot: 0};
  return {tx: 0, ty: 0, rot: op.value * r};
}

function accumulateOps(c, count, partialRatio=0) {
  const cell = cellSize();
  let tx = 0, ty = 0, rot = 0;
  for (let i = 0; i < count; i++) {
    const t = opTransform(c.ops[i], 1, cell);
    tx += t.tx; ty += t.ty; rot += t.rot;
  }
  if (count < c.ops.length) {
    const t = opTransform(c.ops[count], partialRatio, cell);
    tx += t.tx; ty += t.ty; rot += t.rot;
  }
  return {tx, ty, rot};
}

function getState(c, p) {
  const n = c.ops.length;
  if (p <= 0) {
    return {tx:0, ty:0, rotDeg:0, phase:'未开始', currentOp:null, segStart:null, segEnd:null};
  }
  if (p >= 1) {
    const full = accumulateOps(c, n, 0);
    return {tx:full.tx, ty:full.ty, rotDeg:full.rot, phase:'运动完成', currentOp:null, segStart:null, segEnd:null};
  }
  const scaled = p * n;
  let idx = Math.floor(scaled);
  if (idx >= n) idx = n - 1;
  const local = scaled - idx;
  const base = accumulateOps(c, idx, 0);
  const currentOp = c.ops[idx];
  const partial = opTransform(currentOp, local, cellSize());
  const tx = base.tx + partial.tx;
  const ty = base.ty + partial.ty;
  const rotDeg = base.rot + partial.rot;

  let segStart = null, segEnd = null;
  if (currentOp.type === 'moveX' || currentOp.type === 'moveY') {
    const cell = cellSize();
    const startX = (c.sx + 0.5) * cell + base.tx;
    const startY = (c.sy + 0.5) * cell + base.ty;
    segStart = {x:startX, y:startY};
    segEnd = currentOp.type === 'moveX'
      ? {x:startX + currentOp.value * cell, y:startY}
      : {x:startX, y:startY + currentOp.value * cell};
  }
  return {
    tx, ty, rotDeg,
    phase:`第${idx+1}步：${currentOp.text}`,
    currentOp,
    segStart,
    segEnd
  };
}

function drawGuide(id) {
  if (!id) {
    pathLine.style.opacity = 0;
    rotateText.style.opacity = 0;
    return;
  }
  const c = cards[id];
  const s = getState(c, progress[id]);
  if (!s.currentOp) {
    pathLine.style.opacity = 0;
    rotateText.style.opacity = 0;
    return;
  }
  if (s.currentOp.type === 'moveX' || s.currentOp.type === 'moveY') {
    pathLine.setAttribute('x1', s.segStart.x);
    pathLine.setAttribute('y1', s.segStart.y);
    pathLine.setAttribute('x2', s.segEnd.x);
    pathLine.setAttribute('y2', s.segEnd.y);
    pathLine.style.opacity = 1;
    rotateText.setAttribute('x', (s.segStart.x + s.segEnd.x)/2 - 38);
    rotateText.setAttribute('y', (s.segStart.y + s.segEnd.y)/2 - 12);
    rotateText.textContent = s.currentOp.text;
    rotateText.style.opacity = 1;
  } else {
    pathLine.style.opacity = 0;
    const cell = cellSize();
    const cx = (c.sx + 0.5) * cell + s.tx;
    const cy = (c.sy + 0.5) * cell + s.ty;
    rotateText.setAttribute('x', cx - 42);
    rotateText.setAttribute('y', cy - cell*0.18);
    rotateText.textContent = s.currentOp.value > 0 ? '顺时针旋转90°' : '逆时针旋转90°';
    rotateText.style.opacity = 1;
  }
}

function buildInfoHTML(id, phaseText='') {
  if (!id) {
    return `<div class="big">请选择一张卡片</div>
      <p class="line">点击“连续演示”或单张按钮，观察卡片怎样分步骤从左图运动到右图。</p>
      <div class="formula">特别注意：平移不能斜着走，要说清楚向左、向右、向上、向下各移动几格。</div>`;
  }
  const c = cards[id];
  const stepHtml = c.ops.map((op, idx) => `${idx+1}. ${op.text}`).join('<br>');
  const phaseLine = phaseText ? `<p class="line"><b>当前演示：</b>${phaseText}</p>` : '';
  return `<div class="big">${c.title}</div>
    <p class="line">${c.motion}</p>
    ${phaseLine}
    <div class="formula">${c.formula}<br>${stepHtml}</div>`;
}

function syncInfo(force=false) {
  if (!activeId) {
    const html = buildInfoHTML(null);
    if (force || lastInfoKey !== 'none') {
      infoBox.innerHTML = html;
      lastInfoKey = 'none';
    }
    return;
  }
  const c = cards[activeId];
  const s = getState(c, progress[activeId]);
  const key = `${activeId}|${s.phase}|${Math.round(progress[activeId]*100)}`;
  if (force || lastInfoKey !== key) {
    infoBox.innerHTML = buildInfoHTML(activeId, s.phase);
    lastInfoKey = key;
  }
}

function render() {
  const cell = cellSize();
  stage.querySelector('svg').setAttribute('viewBox', `0 0 ${cell*5} ${cell*2}`);
  Object.keys(cards).forEach(id => {
    const c = cards[id];
    const s = getState(c, progress[id]);
    const piece = document.getElementById('piece'+id);
    const badge = document.getElementById('badge'+id);
    piece.style.left = (c.sx * cell) + 'px';
    piece.style.top = (c.sy * cell) + 'px';
    piece.style.transform = `translate(${s.tx}px, ${s.ty}px) rotate(${s.rotDeg}deg)`;
    piece.classList.toggle('active', String(activeId) === String(id));
    badge.style.left = (c.sx * cell + s.tx + cell - 40) + 'px';
    badge.style.top = (c.sy * cell + s.ty + cell - 42) + 'px';
    badge.classList.toggle('active', String(activeId) === String(id));
  });
  drawGuide(activeId);
  syncInfo();
}

function setAll(value) {
  Object.keys(cards).forEach(id => progress[id] = value);
  slider.value = Math.round(value*100);
  percent.textContent = Math.round(value*100) + '%';
  render();
}

function resetAll() {
  running = false;
  activeId = null;
  setAll(0);
  lastInfoKey = '';
  syncInfo(true);
}

function finishAll() {
  running = false;
  activeId = null;
  setAll(1);
  infoBox.innerHTML = `<div class="big">右图完成</div>
    <p class="line">四张卡片都到达目标位置。现在可以清楚看到：平移都不是斜着走，而是分成向左、向右、向上、向下几格来完成。</p>
    <div class="formula">关键：平移只改变位置；旋转改变方向；平移时一次只朝一个方向移动。</div>`;
  lastInfoKey = 'finish';
}

function animateCard(id, duration=2200) {
  return new Promise(resolve => {
    activeId = id;
    lastInfoKey = '';
    const start = performance.now();
    progress[id] = 0;
    function step(now) {
      if (!running) return resolve();
      const t = Math.min(1, (now - start) / duration);
      progress[id] = t;
      render();
      if (t < 1) requestAnimationFrame(step);
      else resolve();
    }
    requestAnimationFrame(step);
  });
}

async function playAll() {
  running = true;
  activeId = null;
  Object.keys(cards).forEach(id => progress[id] = 0);
  slider.value = 0;
  percent.textContent = '0%';
  render();
  for (const id of [1,2,3,4]) {
    if (!running) break;
    await animateCard(id, 2200);
    await new Promise(r => setTimeout(r, 250));
  }
  if (running) {
    activeId = null;
    setAll(1);
    infoBox.innerHTML = `<div class="big">验证完成</div>
      <p class="line">拼图成功：四张卡片都按顺序完成了自己的运动。</p>
      <div class="formula">表达模板：卡片__先……，再……，最后……。其中平移要说清楚向左、向右、向上、向下各移动几格。</div>`;
    lastInfoKey = 'done';
  }
}

function demoOne(id) {
  running = false;
  Object.keys(cards).forEach(k => progress[k] = 0);
  activeId = id;
  render();
  setTimeout(() => {
    running = true;
    animateCard(id, 2400);
  }, 60);
}

slider.addEventListener('input', e => {
  running = false;
  activeId = null;
  const v = Number(e.target.value) / 100;
  Object.keys(cards).forEach(id => progress[id] = v);
  percent.textContent = e.target.value + '%';
  render();
  infoBox.innerHTML = `<div class="big">整体拖动观察</div>
    <p class="line">四张卡片同步分步骤从左图运动到右图。注意所有平移都拆成了向左、向右、向上、向下的移动，没有任何一张卡片斜着平移。</p>
    <div class="formula">观察重点：①④有旋转；②③没有旋转；四张卡片的平移都要说清楚移动方向和移动几格。</div>`;
  lastInfoKey = 'slider';
});

window.addEventListener('resize', render);
render();
</script>
